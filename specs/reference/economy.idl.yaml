# =============================================================================
# Economy IDL — Machine-Readable Economy Specification
# =============================================================================
# Independent economy specification. Fixed-point types only.
# All rates expressed as integer BasisPoints (bp). No f64.
# =============================================================================

api_version: "0.1.1"

version_domains:
  ECONOMY_API_VERSION: "0.1.1"
  independence: "Independent from GAME_API_VERSION, AUTH_API_VERSION, PLUGIN_ABI_VERSION, SDK package versions, and implementation crate versions."

# =============================================================================
# 1. Fixed-Point Types
# =============================================================================
types:
  description: >
    All economy types use fixed-point integer arithmetic. Floating-point (f64)
    is prohibited for deterministic replay. BasisPoints provide hundredths-of-a-percent
    precision (1 bp = 0.01% = 1/10000).

  ResourceName:
    base: string
    constraints: "case-sensitive configured identifier; Vanilla canonical value is Energy"

  BasisPoints:
    description: >
      Fixed-point rate type. 1 bp = 0.01% = 1/10000.
      All percentages, tax rates, and refund fractions are expressed in bp.
    underlying: u32
    unit: "basis points (bp)"
    range: "0 .. 10000 (0% .. 100%)"
    example: "5000 bp = 50.00%"

  ResourceRate_i64:
    description: >
      Signed resource flow rate. Positive = income, negative = expense.
      Used for per-tick delta calculations that can be negative (e.g., net income
      after deductions).
    underlying: i64
    scale: 1_000_000
    unit: "micro resource units per tick"
    range: "-2^63 .. 2^63-1"

  MilliUnits:
    description: >
      Sub-unit precision for fractional resource amounts during intermediate
      calculations. 1 unit = 1000 mU. Final amounts are always floored to integer
      units before state commit.
    underlying: i64
    unit: "milliunits (1/1000 of a resource unit)"
    range: "-2^63 .. 2^63-1"
    rounding: "floor to integer units on state commit"

# =============================================================================
# 2. ResourceOperation Definitions
# =============================================================================
resource_operation:
  description: >
    Economy resource operations. These are engine-side computations, not player
    CommandActions. All amounts are integer (u64/u32), all rates are BasisPoints.
    This IDL defines economy types, operations, and formulas only; it does not
    define MCP tools, Auth surfaces, SDK routes, or plugin-specific market commands.

  operations:
    # -------------------------------------------------------------------------
    # 2.1 RecycleRefund — lifespan-based partial refund
    # -------------------------------------------------------------------------
    - name: RecycleRefund
      category: lifecycle
      description: >
        Refund a fraction of the original body cost when recycling a drone or
        structure. The refund is proportional to remaining lifespan.
        Minimum refund: 10% (1000 bp). Maximum refund: 50% (5000 bp).
      trigger: "Recycle command (CommandAction index 8)"
      parameters:
        - name: total_lifespan
          type: u32
          unit: ticks
          description: "Maximum lifespan of the entity at creation time"
        - name: remaining_lifespan
          type: u32
          unit: ticks
          description: "Remaining lifespan at the time of recycling"
        - name: body_cost
          type: u64
          unit: resource units
          description: "Total resource cost of the body parts at creation time"
      computation:
        refund_rate_bp:
          formula: "max(1000, (remaining_lifespan * 5000) / total_lifespan)"
          description: "Proportional rate clamped to [1000, 5000] bp (10%–50%)"
          output_type: BasisPoints
        refund_amount:
          formula: "(refund_rate_bp * body_cost) / 10000"
          description: "Integer floor of refunded resource units"
          output_type: u64
      example:
        total_lifespan: 1500
        remaining_lifespan: 900
        body_cost: 10000
        refund_rate_bp: 3000  # (900 * 5000) / 1500 = 3000 bp = 30%
        refund_amount: 3000   # (3000 * 10000) / 10000 = 3000 units

    # -------------------------------------------------------------------------
    # 2.2 StorageTax — smooth marginal tax on global storage holdings
    # -------------------------------------------------------------------------
    - name: StorageTax
      category: taxation
      description: >
        Per-tick tax assessed on resources held in global storage. The marginal
        rate is a continuous cubic Hermite smoothstep through design-defined
        utilization anchors. In S29 it runs after UpkeepDeduction and before later recurring faucet/settlement operations.
      trigger: "every tick, per player"
      parameters:
        - name: stored_total
          type: u64
          unit: resource units
          description: "Sum of all resources currently in global storage"
        - name: storage_capacity
          type: u64
          unit: resource units
          description: "Player's current global storage capacity"
      tax_schedule:
        interpolation: quadratic_smoothstep
        anchors:
          - { utilization_ppm: 300000, marginal_rate_bp: 0 }
          - { utilization_ppm: 600000, marginal_rate_bp: 1 }
          - { utilization_ppm: 850000, marginal_rate_bp: 5 }
          - { utilization_ppm: 1000000, marginal_rate_bp: 20 }
        integration_step_ppm: 1000
      computation:
        tax_deduction:
          formula: "floor(integral_0^stored_total smoothstep_marginal_rate_bp(x / storage_capacity) dx / 10000)"
          description: "Evaluate with integer utilization ppm, s(t)=3t^2-2t^3 between adjacent anchors, fixed 1000 ppm left-closed/right-open steps, u128 intermediates, and final floor."
          output_type: u64
      derived_from: "design/gameplay.md global_storage_tax_curve"

    # -------------------------------------------------------------------------
    # 2.3 UpkeepDeduction — per-tick empire maintenance cost
    # -------------------------------------------------------------------------
    - name: UpkeepDeduction
      category: maintenance
      description: >
        Per-tick empire-wide upkeep cost deducted from player global storage.
        Uses superlinear empire upkeep formula (per specs/core/resource-ledger.md
        §Empire Upkeep). Deducted before StorageTax in Resource Ledger order.
      trigger: "every tick, per player"
      parameters:
        - name: room_count
          type: u32
          description: "Number of rooms controlled by the player"
        - name: base_upkeep
          type: u32
          unit: resource units
          description: "Base upkeep per room (Standard=50, Vanilla=30, Tutorial=10)"
        - name: room_soft_cap
          type: u32
          description: "Room soft cap for superlinear curve (Standard=10, Vanilla=15, Tutorial=20)"
      computation:
        total_upkeep:
          formula: "base_upkeep × room_count × (1 + room_count / room_soft_cap)"
          description: "Superlinear empire upkeep. Integer floor."
          output_type: u64
        deficit_handling:
          description: >
            If global storage insufficient, deduct to 0 and record UpkeepDeficit.
            Consecutive 3-tick deficit → drone hunger (efficiency multiplier 5000 bps = -50%).
            Consecutive 10-tick deficit → forced drone death (age ×10 acceleration).
      derived_from: "design/gameplay.md empire upkeep defaults"

    # -------------------------------------------------------------------------
    # 2.4 PvEAward — resource grant for defeating NPC entities
    # -------------------------------------------------------------------------
    - name: PvEAward
      category: reward
      description: >
        Resource award settled from PvE content owned by the pve-spawning plugin.
        Award amount depends on configured event/entity tier and difficulty.
        Swarmling-style NPCs do not create per-kill drops or shared event awards
        unless the owning plugin emits a configured PvE settlement event.
      trigger: "pve-spawning event settlement"
      parameters:
        - name: entity_type
          type: string
          description: "NPC/entity or plugin event type reported by pve-spawning"
        - name: entity_tier
          type: u32
          description: "Difficulty tier of the NPC (1-5)"
      award_schedule:
        description: "Base award rates per tier"
        tiers:
          - tier: 1
            base_award: 100
            description: "Trivial NPC"
          - tier: 2
            base_award: 500
            description: "Easy NPC"
          - tier: 3
            base_award: 2000
            description: "Medium NPC"
          - tier: 4
            base_award: 10000
            description: "Hard NPC"
          - tier: 5
            base_award: 50000
            description: "Boss NPC"
      computation:
        award_amount:
          formula: "base_award + (entity_type_modifier * base_award) / 10000"
          description: "Entity type modifier (in bp) adjusts base award"
          output_type: u64
      entity_type_modifiers:
        description: "Type-specific modifiers in BasisPoints (0 bp = 0%, 5000 bp = +50%)"
        default: 0

    # -------------------------------------------------------------------------
    # 2.5 BuildCost — resource cost to build structures
    # -------------------------------------------------------------------------
    - name: BuildCost
      category: construction
      description: >
        Resource cost to build a structure. Deducted at the start of construction.
        Costs vary by structure type.
      trigger: "Build command (CommandAction index 9)"
      parameters:
        - name: structure_type
          type: StructureType
          description: "Type of structure being built"
      cost_schedule:
        description: "Base build costs per structure type in resource units"
        structure_allowlist:
          core_count: 13
          optional_count: 4
          optional_default: []
          optional_allowed_values: [Road, Wall, Rampart, Container]
        structures:
          - type: Spawn
            cost: 300
            description: "Drone spawn point"
          - type: Extension
            cost: 200
            description: "Capacity extension"
          - type: Storage
            cost: 500
            description: "Local resource storage"
          - type: Tower
            cost: 800
            description: "Defensive tower"
          - type: Link
            cost: 400
            description: "Energy transfer link"
          - type: Extractor
            cost: 600
            description: "Resource extractor"
          - type: Lab
            cost: 1000
            description: "Research laboratory"
          - type: Terminal
            cost: 1200
            description: "Trade terminal"
          - type: Observer
            cost: 500
            description: "Observation post"
          - type: Depot
            cost: 600
            description: "Forward maintenance and logistics depot"
          - type: Factory
            cost: 1500
            description: "Commodity production facility"
          - type: PowerSpawn
            cost: 1200
            description: "High-tier drone spawn point"
          - type: Nuker
            cost: 5000
            description: "Strategic weapon facility"
      computation:
        build_cost:
          formula: "structure_base_cost * controller_level_discount_factor"
          description: "Controller level may reduce build cost (implemented as a multiplier in bp)"
          output_type: u64
        mode_b_burn:
          fee_bp: 500
          formula: "floor(build_cost * 500 / 10000)"
          description: "Mode-B extra 5% explicit sink leg; builder debit = build_cost + mode_b_burn"
          output_type: u64
      controller_discount:
        description: "Per controller level, build costs are multiplied by a discount factor in bp"
        levels:
          - level: 1
            discount_factor_bp: 10000  # 100% = no discount
          - level: 2
            discount_factor_bp: 9500   # 95%
          - level: 3
            discount_factor_bp: 9000   # 90%
          - level: 4
            discount_factor_bp: 8500   # 85%
          - level: 5
            discount_factor_bp: 8000   # 80%
          - level: 6
            discount_factor_bp: 7500   # 75%
          - level: 7
            discount_factor_bp: 7000   # 70%
          - level: 8
            discount_factor_bp: 6500   # 65%
      optional_structures:
        - type: Road
          cost: 10
          description: "Movement infrastructure; requires optional_structure_types allowlist"
        - type: Wall
          cost: 50
          description: "Defensive wall; requires optional_structure_types allowlist"
        - type: Rampart
          cost: 100
          description: "Fortified wall; requires optional_structure_types allowlist"
        - type: Container
          cost: 100
          description: "Small local resource container; requires optional_structure_types allowlist"

    # -------------------------------------------------------------------------
    # 2.6 SpawnCost — resource cost to spawn drones
    # -------------------------------------------------------------------------
    - name: SpawnCost
      category: lifecycle
      description: >
        Resource cost to spawn a drone. Cost is the sum of individual body part
        costs. Deducted at the start of spawning.
      trigger: "Spawn command (CommandAction index 7)"
      parameters:
        - name: body_parts
          type: "[BodyPart]"
          description: "Array of body parts to assemble the drone"
      cost_schedule:
        description: "Base cost per body part type in resource units"
        body_parts:
          - part: MOVE
            cost: 50
            description: "Movement capability"
          - part: WORK
            cost: 100
            description: "Work/harvest capability"
          - part: CARRY
            cost: 50
            description: "Carrying capacity"
          - part: ATTACK
            cost: 80
            description: "Melee attack capability"
          - part: RANGED_ATTACK
            cost: 150
            description: "Ranged attack capability"
          - part: HEAL
            cost: 250
            description: "Healing/repair capability"
          - part: CLAIM
            cost: 600
            description: "Controller claim capability"
          - part: TOUGH
            cost: 10
            description: "Durability (hit points)"
      computation:
        spawn_cost:
          formula: "sum(body_part.cost for each body_part)"
          description: "Simple additive cost of all body parts"
          output_type: u64
      spawn_limits:
        max_body_parts: 50
        max_spawn_cost: null  # implicitly bounded by max_body_parts * max_part_cost

    # -------------------------------------------------------------------------
    # 2.7 AlliedTransfer — transfer between allied players (fee + cooldown)
    # -------------------------------------------------------------------------
    - name: AlliedTransfer
      category: transfer
      description: >
        Resource transfer between allied players via global storage.
        Subject to fee, cooldown, and daily cap (per specs/core/resource-ledger.md §2.1).
        Both sender and receiver must have an active alliance ≥ 100 tick.
      trigger: "AlliedTransfer command (CommandAction index 14)"
      parameters:
        - name: sender_id
          type: PlayerId
          description: "Player sending resources"
        - name: receiver_id
          type: PlayerId
          description: "Player receiving resources"
        - name: resource_type
          type: ResourceName
          description: "Type of resource being transferred"
        - name: amount
          type: u64
          unit: resource units
          description: "Amount to transfer"
      constraints:
        allied_only: true
        alliance_requirement: "Both players must share an active alliance for ≥ 100 tick"
        fee_bp: 200
        fee_description: "2.00% fee on transferred amount"
        transfer_delay: 200
        delay_unit: tick
        cooldown: 500
        cooldown_unit: tick
        cooldown_scope: "per receiver"
        daily_cap: "max(10_000, receiver_gcl * 20_000) * allied_daily_cap_world_multiplier / 100"
        daily_cap_unit: resource units
        daily_cap_scope: "per receiver per 24h"
        rate_limit: "Receiver and sender must satisfy allied cap and transfer rate-limit policy"
      computation:
        sender_deduction:
          formula: "amount"
          description: "Full amount deducted from sender global storage"
          output_type: u64
        receiver_credit:
          formula: "amount"
          description: "Full amount credited to receiver global storage (after delay)"
          output_type: u64
        fee_deduction:
          formula: "(amount * 200) / 10000"
          description: "2.00% fee on transferred amount, deducted separately from sender"
          output_type: u64
      derived_from: "design/gameplay.md allied transfer fee"

    # -------------------------------------------------------------------------
    # 2.8-2.12 Remaining core ResourceOperation variants
    # -------------------------------------------------------------------------
    - name: LocalTransfer
      category: transfer
      trigger: "Transfer or Withdraw command"
      description: "Conservative local resource movement between visible in-range entities."
      parameters: [source_id, target_id, resource_type, amount]

    - name: GlobalDeposit
      category: global_storage
      trigger: "TransferToGlobal command"
      description: "Local to global transfer with 100 bp Mode-B burn and 10-tick delay."
      parameters: [player_id, resource_type, amount]

    - name: GlobalWithdraw
      category: global_storage
      trigger: "TransferFromGlobal command"
      description: "Global to local transfer with 100 bp Mode-B burn and 100-tick delay."
      parameters: [player_id, resource_type, amount]

    - name: ControllerPassiveIncome
      category: faucet
      trigger: "S29 every tick per claimed controller"
      description: "Budgeted Vanilla Energy income derived from Controller level."
      parameters: [player_id, controller_id, controller_level]

    - name: WreckageSalvage
      category: faucet
      trigger: "S29 when owned drone wreckage is salvaged"
      description: "Budgeted, tick-decaying Energy salvage below RecycleRefund value."
      parameters: [player_id, wreckage_id, remaining_value]

    - name: WorldStartupSubsidy
      category: faucet
      trigger: "first world/player entry only"
      description: "One-time Vanilla starting package {Energy: 5000}; recorded in TickTrace/audit outside recurring S29."
      parameters: [player_id, world_id, starting_resources]

    - name: CodeUpdateCost
      category: deploy
      trigger: "accepted new swarm_deploy only; AlreadyDeployed is exempt"
      description: "Typed world-config deploy fee, default {Energy: 0}; debited atomically with deploy manifest/cooldown/refund-credit reset."
      parameters: [player_id, world_id, module_slot, cost_by_resource]

    # -------------------------------------------------------------------------
    # 2.15 PluginSettlement — namespaced plugin resource settlement
    # -------------------------------------------------------------------------
    - name: PluginSettlement
      category: plugin
      description: >
        Namespaced settlement record for economy-affecting plugins such as markets
        or PvE events. Core Economy IDL does not define concrete market variants;
        plugins report typed settlement data under their plugin namespace and are
        still checked by the Resource Ledger.
      parameters:
        - name: plugin_id
          type: string
          description: "Namespaced plugin identifier from mods.lock"
        - name: settlement_kind
          type: string
          description: "Plugin-defined typed settlement kind"
        - name: resource_delta
          type: ResourceDelta
          description: "Signed resource delta legs checked by Resource Ledger conservation"
      computation:
        ledger_validation:
          formula: "sum(settlement.resource_delta legs) + explicit faucet/sink legs == 0"
          description: "Plugin settlements must balance through explicit ledger accounts."

# =============================================================================
# 3. Formulas — canonical computation references
# =============================================================================
formulas:
  description: >
    Canonical formula definitions used across economy operations.
    All formulas operate on integer types only. Intermediate results
    may use MilliUnits for precision; final results are u64.

  recycle_refund:
    description: "Lifespan-proportional refund for recycling"
    steps:
      - step: 1
        operation: "refund_rate_bp = max(1000, (remaining_lifespan * 5000) / total_lifespan)"
        types: "u32, u32 → u32 (BasisPoints)"
        clamp: "[1000, 5000] bp → [10%, 50%]"
      - step: 2
        operation: "refund_amount = (refund_rate_bp * body_cost) / 10000"
        types: "u32, u64 → u64"
        rounding: floor

  storage_tax:
    description: "Continuous smoothstep marginal per-tick tax on global storage"
    steps:
      - step: 1
        operation: "u_ppm = floor(stored_total * 1000000 / storage_capacity)"
      - step: 2
        operation: "Interpolate marginal_rate_bp with integer quadratic smoothstep between anchors (300000,0), (600000,1), (850000,5), (1000000,20)"
      - step: 3
        operation: "Integrate marginal rate with fixed 1000 ppm left-closed/right-open steps; tax = floor(integral / 10000)"
        types: "u128 intermediates → u64"
        rounding: floor

  build_cost_discounted:
    description: "Controller-level discounted build cost"
    steps:
      - step: 1
        operation: "discounted_cost = (base_cost * discount_factor_bp) / 10000"
        types: "u64, u32 → u64"
        rounding: floor

  spawn_cost_total:
    description: "Total spawn cost from body parts"
    steps:
      - step: 1
        operation: "total = sum(part_cost for each body_part)"
        types: "[u64] → u64"

# =============================================================================
# 4. Economy-Specific Limits
# =============================================================================
limits:
  description: "Economy-specific capacity limits. Complements game_api.idl.yaml §5."

  storage_limits:
    max_storage_per_player:
      value: 1000000
      unit: "resource units"
      description: "Per-player global storage capacity"
      note: "adjustable via world.toml"
    global_resource_cap:
      value: 100000000
      unit: "resource units"
      description: "World-wide total resource cap across all players"
      note: "engine-enforced; new resource creation is rejected when cap is reached"

  storage_tax_curve:
    description: "Smoothstep marginal-rate anchors in utilization ppm; not discrete tiers."
    anchors: ["300000ppm→0bp", "600000ppm→1bp", "850000ppm→5bp", "1000000ppm→20bp"]
    integration_step_ppm: 1000

  resource_flow_limits:
    max_single_transfer:
      value: 100000
      unit: "resource units"
      description: "Maximum resource units in a single transfer operation"
    max_per_tick_income:
      value: 1000000
      unit: "resource units per tick"
      description: "Hard cap on total resource income per player per tick"
    max_per_tick_expense:
      value: 1000000
      unit: "resource units per tick"
      description: "Hard cap on total resource deductions per player per tick"

  enumeration:
    max_active_alliances:
      value: 10
      description: "Maximum number of active alliances per player"

# =============================================================================
