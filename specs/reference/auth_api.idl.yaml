# =============================================================================
# Auth API IDL - Machine-Readable REST Operation Source
# =============================================================================
# Wire-schema reference for design/auth.md. API semantics, boundaries and
# security behavior are owned by design/auth.md and design/interface.md.
# Auth lifecycle is exposed only as explicit REST action routes.
# =============================================================================

api_version: "0.3.0"

version_domains:
  AUTH_API_VERSION: "0.3.0"
  CANONICAL_REQUEST_VERSION: "SWARM-REQUEST-V1"
  DEPLOY_SIGNATURE_VERSION: "SWARM-DEPLOY-V1"
  CERTIFICATE_CHAIN_VERSION: "single-layer-server-ca"
  BROWSER_KEY_EXPORT_VERSION: "ed25519-argon2id-aes-256-gcm-v1"
  independence: "Independent from GAME_API_VERSION, ECONOMY_API_VERSION, PLUGIN_ABI_VERSION, SDK package versions, and implementation crate versions."

excluded_surfaces:
  alternate_auth_lifecycle: "Auth lifecycle MUST NOT be exposed outside the explicit REST action routes."
  browser_cookie_auth: "Browser cookie or browser request-header checks are not auth trust branches. Ordinary CORS may exist but is not identity."

auth_control_plane:
  description: >
    CSR registration and certificate lifecycle REST operations. All clients,
    including Browser, CLI and AI Agent, use application-layer certificates and
    Ed25519 signatures for authenticated requests. The server never stores user
    private keys, export bundles, KEKs or passwords.
  total_operations: 7
  operations:
    - operation_id: auth_register_challenge
      method: POST
      route: /auth/register/challenge
      category: csr_lifecycle
      auth_required: false
      input_schema: RegisterChallengeRequest
      output_schema: RegisterChallengeResponse
      rate_limit: "10/min"
      subject_source: none
      replay_class: non_replayable
      visibility_filter: none
      rate_limit_key: per_ip
      description: "Create a one-use PoW challenge for CSR registration."

    - operation_id: auth_csr_submit
      method: POST
      route: /auth/csr/submit
      category: csr_lifecycle
      auth_required: false
      input_schema: CsrSubmitRequest
      output_schema: CsrSubmitResponse
      rate_limit: "1/30s"
      subject_source: csr_public_key
      replay_class: non_idempotent_mutation
      visibility_filter: none
      rate_limit_key: per_ip
      description: >
        Submit a CSR, requested usages, requested audience, PoW nonce and CSR
        signature. The server validates admission, consumes the challenge and
        issues ClientAuthCertificate plus CodeSigningCertificate through the
        single-layer Server CA.

    - operation_id: auth_cert_renew
      method: POST
      route: /auth/cert/renew
      category: certificate_lifecycle
      auth_required: true
      required_certificate_usage: client_auth
      input_schema: CertRenewRequest
      output_schema: CertRenewResponse
      rate_limit: "5/min"
      subject_source: certificate_player_id
      replay_class: non_idempotent_mutation
      visibility_filter: owner
      rate_limit_key: per_player
      description: "Renew same-purpose certificates by proving possession of a valid application certificate key."

    - operation_id: auth_cert_revoke
      method: POST
      route: /auth/cert/revoke
      category: certificate_lifecycle
      auth_required: true
      required_certificate_usage: client_auth
      input_schema: CertRevokeRequest
      output_schema: CertRevokeResponse
      rate_limit: "5/min"
      subject_source: certificate_player_id
      replay_class: admin_critical
      visibility_filter: owner
      rate_limit_key: per_player
      description: "Revoke a certificate and write the revocation audit record."

    - operation_id: auth_cert_list
      method: GET
      route: /auth/cert/list
      category: certificate_lifecycle
      auth_required: true
      required_certificate_usage: client_auth
      input_schema: CertListRequest
      output_schema: CertListResponse
      rate_limit: "30/min"
      subject_source: certificate_player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player
      description: "List certificates visible to the authenticated player."

    - operation_id: auth_cert_check
      method: POST
      route: /auth/cert/check
      category: certificate_lifecycle
      auth_required: true
      required_certificate_usage: client_auth
      input_schema: CertCheckRequest
      output_schema: CertCheckResponse
      rate_limit: "100/min"
      subject_source: certificate_player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player
      description: "Check certificate chain, revocation state, audience and usage."

    - operation_id: auth_server_trust
      method: GET
      route: /auth/server/trust
      category: server_trust
      auth_required: false
      input_schema: ServerTrustRequest
      output_schema: ServerTrustResponse
      rate_limit: "60/min"
      subject_source: none
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global
      description: "Return Server CA fingerprint, algorithm and operator label for explicit client confirmation."

schemas:
  RegisterChallengeRequest:
    type: object
    additional_properties: false
    properties: {}
    required: []

  RegisterChallengeResponse:
    type: object
    additional_properties: false
    required: [challenge_id, challenge, difficulty_bits, expires_at]
    properties:
      challenge_id: string
      challenge: string
      difficulty_bits: u32
      expires_at: u64

  CsrSubmitRequest:
    type: object
    additional_properties: false
    required: [username, csr, requested_usages, requested_audience, challenge_id, nonce, csr_signature]
    properties:
      username: string
      csr: string
      requested_usages: [client_auth, code_signing]
      requested_audience: [Audience]
      challenge_id: string
      nonce: string
      csr_signature: string

  CsrSubmitResponse:
    type: object
    additional_properties: false
    required: [certificate_bundle]
    properties:
      certificate_bundle:
        client_auth_cert: ClientAuthCertificate
        code_signing_cert: CodeSigningCertificate
        cert_id: string
        player_id: PlayerId
        public_key_fingerprint: string
        issued_at: u64
        expires_at: u64

  CertRenewRequest:
    type: object
    additional_properties: false
    required: [certificate_id, renewal_csr, proof_signature]
    properties:
      certificate_id: string
      renewal_csr: string
      proof_signature: string

  CertRenewResponse:
    type: object
    additional_properties: false
    required: [certificate_bundle]
    properties:
      certificate_bundle:
        client_auth_cert: ClientAuthCertificate
        code_signing_cert: CodeSigningCertificate
        cert_id: string
        issued_at: u64
        expires_at: u64

  CertRevokeRequest:
    type: object
    additional_properties: false
    required: [certificate_id, reason]
    properties:
      certificate_id: string
      reason: RevocationReason

  CertRevokeResponse:
    type: object
    additional_properties: false
    required: [revoked, revocation_time, crl_updated]
    properties:
      revoked: bool
      revocation_time: u64
      crl_updated: bool

  CertListRequest:
    type: object
    additional_properties: false
    properties:
      status: string
    required: []

  CertListResponse:
    type: object
    additional_properties: false
    required: [certificates]
    properties:
      certificates: [CertificateSummary]

  CertCheckRequest:
    type: object
    additional_properties: false
    required: [certificate_id, transport, usage]
    properties:
      certificate_id: string
      transport: Audience
      usage: CertificateUsage

  CertCheckResponse:
    type: object
    additional_properties: false
    required: [valid, certificate_id, player_id, public_key_fingerprint, usage, allowed_audience, expires_at, revoked]
    properties:
      valid: bool
      certificate_id: string
      player_id: PlayerId
      public_key_fingerprint: string
      usage: CertificateUsage
      allowed_audience: [Audience]
      expires_at: u64
      revoked: bool

  ServerTrustRequest:
    type: object
    additional_properties: false
    properties: {}
    required: []

  ServerTrustResponse:
    type: object
    additional_properties: false
    required: [server_ca_fingerprint, algorithm, operator_label]
    properties:
      server_ca_fingerprint: string
      algorithm: ed25519
      operator_label: string
      issued_at: u64

  ClientAuthCertificate:
    fields:
      cert_id: string
      player_id: PlayerId
      public_key: Ed25519PublicKey
      usage: client_auth
      scopes: [string]
      allowed_audience: [Audience]
      issued_at: u64
      expires_at: u64
      issuer: ServerCaFingerprint

  CodeSigningCertificate:
    fields:
      cert_id: string
      player_id: PlayerId
      public_key: Ed25519PublicKey
      usage: code_signing
      scopes: [string]
      allowed_audience: [Audience]
      issued_at: u64
      expires_at: u64
      issuer: ServerCaFingerprint

  CertificateSummary:
    fields:
      cert_id: string
      usage: CertificateUsage
      label: string
      fingerprint: string
      allowed_audience: [Audience]
      issued_at: u64
      expires_at: u64
      status: string

  Audience:
    description: "Canonical actual transport audience value. The verifier checks membership against the received request transport."
    variants: [rest, mcp, ws, replay]

  CertificateUsage:
    variants: [client_auth, code_signing]

  RevocationReason:
    variants: [key_compromise, device_lost, admin_action, server_ca_compromise, code_signing_verifier_bug]

canonical_request_signature:
  domain: SWARM-REQUEST-V1
  headers:
    - Swarm-Certificate
    - Swarm-Cert-Id
    - X-Swarm-Transport
    - Swarm-Timestamp
    - Swarm-Nonce
    - Swarm-Signature
  payload_lines:
    - SWARM-REQUEST-V1
    - TRANSPORT
    - METHOD
    - SCHEME
    - AUTHORITY
    - PATH_AND_QUERY
    - TIMESTAMP
    - NONCE
    - CERTIFICATE_ID
    - PLAYER_ID
    - BLAKE3(stable_json(body))
  verifier_requirements:
    - "Verify certificate chain to the configured single-layer Server CA."
    - "Verify certificate usage, expiry and revocation state."
    - "Verify Ed25519 signature over the canonical payload."
    - "Verify signed TRANSPORT matches X-Swarm-Transport and the actual received entrypoint."
    - "Verify signed TRANSPORT is a member of certificate allowed_audience."
    - "Verify SCHEME + AUTHORITY + PATH_AND_QUERY exactly match the received request."
    - "Verify TIMESTAMP is parseable and within the fixed 60-second freshness window."
    - "Atomically record NONCE in the (cert_id, transport) replay scope and reject duplicates."
    - "Fail closed when timestamp/nonce parsing or replay-store read/atomic-write fails."

deploy_signature:
  domain: SWARM-DEPLOY-V1
  required_fields:
    - domain
    - wasm_hash
    - metadata_hash
    - player_id
    - world_id
    - module_slot
    - version_counter
    - transport
    - signed_at
  certificate_requirement: CodeSigningCertificate
  audience_check: "Certificate allowed_audience is checked separately against the actual deploy transport."
  server_derived_fields:
    - compiled_artifact_hash
    - deploy_payload_hash

browser_private_key_export:
  key_algorithm: Ed25519
  exportability: manual_export_import_only
  encryption: AES-256-GCM
  kek_derivation: Argon2id
  server_storage: none
  requirements:
    - "Browser requires explicit Server CA fingerprint confirmation before CSR."
    - "Confirmed fingerprint is persisted locally."
    - "Fingerprint changes fail closed until the user explicitly confirms the new fingerprint."
    - "Export requires a user-supplied password."
    - "Password derives KEK with Argon2id; KEK encrypts the private key with AES-256-GCM."
    - "Server stores no private key, password, KEK or encrypted private-key bundle."

auth_error_envelope:
  format: json
  schema:
    error:
      code: AuthError
      message: string
      debug_detail: "string | null"
  rules:
    - "Auth REST does not use JSON-RPC error.data.rejection_reason."
    - "code is one of errors.canonical[].code."
    - "debug_detail is optional, non-canonical, and subject to the same visibility and secret-redaction rules as successful responses."

errors:
  total_canonical_codes: 6
  canonical:
    - code: InvalidTransportBinding
      http_status: 401
      semantics: "Signature payload transport does not match the actual request transport, or a required transport binding field is missing."
    - code: AudienceMismatch
      http_status: 403
      semantics: "Signature is valid, but the certificate allowed_audience does not cover the actual transport."
    - code: InvalidCertificate
      http_status: 401
      semantics: "Certificate chain, signature, required usage, expiry or revocation check failed."
    - code: RateLimited
      http_status: 429
      semantics: "Operation rate limit exceeded."
    - code: RequestExpired
      http_status: 401
      semantics: "Request timestamp is invalid or outside the fixed 60-second freshness window."
    - code: ReplayDetected
      http_status: 409
      semantics: "Nonce was already used, or the nonce replay store could not be read or updated safely."

auth_trace_events:
  total_event_types: 8
  events:
    - name: auth.challenge_issued
      operation_id: auth_register_challenge
    - name: auth.csr_submitted
      operation_id: auth_csr_submit
    - name: auth.cert_issued
      operation_id: auth_csr_submit
    - name: auth.cert_renewed
      operation_id: auth_cert_renew
    - name: auth.cert_revoked
      operation_id: auth_cert_revoke
    - name: auth.cert_checked
      operation_id: auth_cert_check
    - name: auth.server_trust_read
      operation_id: auth_server_trust
    - name: auth.transport_rejected
      operation_id: verifier
