# =============================================================================
# Auth API IDL — Machine-Readable Single Source of Truth
# =============================================================================
# Canonical source for auth subsystem codegen / SDK / CI. All other auth docs
# derive from this file. This file is validated by CI — do not edit Markdown
# tables directly.
#
# R33 B4 重写: bearer token → application-layer certificate chain model
# Per design/auth.md: CSR→certificate→credential→session, Ed25519 canonical
# request signatures, audience/scope labels, passkey/recovery/federation.
# =============================================================================

api_version: "0.2.0"

# =============================================================================
# 1. CSR Lifecycle Tools — 7 core CSR/certificate lifecycle tools
# =============================================================================
csr_lifecycle_tools:
  description: >
    Core CSR registration and certificate lifecycle tools. All clients must
    register via PoW challenge → CSR submit → certificate issuance before
    accessing any protected resources. Application-layer certificates (Ed25519)
    are the sole trust root. No bearer tokens, no OAuth2, no TLS/mTLS certs.
  total_tools: 7

  rate_limits:
    challenge: "10/min per IP"
    submit_csr: "1/30s per IP"
    renew: "5/min per player"
    revoke: "5/min per player"
    cert_list: "30/min per player"
    cert_check: "100/min per player"
    server_trust: "30/min"

  tools:
    # --- 1.1 Register Challenge ---
    - name: swarm_register_challenge
      index: 1
      category: csr_lifecycle
      input_schema: {}
      output_schema:
        challenge_id: string
        challenge: string
        difficulty_bits: u32
        expires_at: u64
      rate_limit: "10/min"
      required_scope: "none"
      subject_source: none
      replay_class: non_replayable
      visibility_filter: none
      rate_limit_key: per_ip
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        Request a PoW challenge for CSR registration. Returns a blake3-based
        challenge with configurable difficulty bits. Challenge expires after
        TTL (default 300s). Anti-spam: L1 PoW per IP, L2 per-ASN, L3 global
        semaphore, L4 bounded queue, L5 audit throttle.

    # --- 1.2 Submit CSR ---
    - name: swarm_submit_csr
      index: 2
      category: csr_lifecycle
      input_schema:
        username: string
        csr: string
        certificate_profile: string
        device_label: string
        challenge_id: string
        nonce: string
        csr_signature: string
        email: string
        recovery_password: string
      output_schema:
        certificate_bundle:
          client_auth_cert: string
          code_signing_cert: string
          cert_id: string
          player_id: PlayerId
          public_key_fingerprint: string
          issued_at: u64
          expires_at: u64
      rate_limit: "1/30s"
      required_scope: "none"
      subject_source: none
      replay_class: non_idempotent_mutation
      visibility_filter: none
      rate_limit_key: per_ip
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        Submit a CSR with PoW proof and Ed25519 csr_signature. Server validates
        the multi-layer admission chain (L1-L6), then issues ClientAuthCertificate
        + CodeSigningCertificate via Server Intermediate CA. CSR payload: SWARM-CSR-V1
        with username, public_key, requested_usages, certificate_profile,
        challenge_id, challenge. FDB transaction atomically consumes challenge,
        creates/updates user, records public key, and issues certificates.

    # --- 1.3 Renew Certificate ---
    - name: swarm_renew_certificate
      index: 3
      category: csr_lifecycle
      input_schema:
        certificate_id: string
        renewal_csr: string
        proof_signature: string
      output_schema:
        certificate_bundle:
          client_auth_cert: string
          code_signing_cert: string
          cert_id: string
          issued_at: u64
          expires_at: u64
      rate_limit: "5/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: idempotent_mutation
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        Renew an application-layer certificate by proving possession of the
        same Ed25519 private key. Issues new ClientAuthCertificate +
        CodeSigningCertificate. Old certificate is NOT revoked (valid until
        expiry) unless explicitly revoked. Cannot be called by temporary_device
        or managed_device certificates to renew other devices' certs.

    # --- 1.4 Revoke Certificate ---
    - name: swarm_revoke_certificate
      index: 4
      category: csr_lifecycle
      input_schema:
        certificate_id: string
        reason: string
      output_schema:
        revoked: bool
        revocation_time: u64
        crl_updated: bool
      rate_limit: "5/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: admin_critical
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        Self-service certificate revocation. Revokes the specified certificate
        and updates the CRL. Cannot be called by temporary_device or
        managed_device certificates to revoke other devices' certs. Admin
        revocation uses the admin-critical path with dual-audit.

    # --- 1.5 List Certificates ---
    - name: swarm_cert_list
      index: 5
      category: csr_lifecycle
      input_schema:
        status: string
      output_schema:
        certificates: >
          [{cert_id, usage, device_label, fingerprint, issued_at, expires_at,
          status, managed_by_server}]
      rate_limit: "30/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        List all certificates for the authenticated player, optionally filtered
        by status (active, expired, revoked). Returns usage type, device label,
        fingerprint, validity window, and managed_by_server flag.

    # --- 1.6 Check Certificate ---
    - name: swarm_cert_check
      index: 6
      category: csr_lifecycle
      input_schema:
        certificate_id: string
      output_schema:
        valid: bool
        player_id: PlayerId
        usage: string
        scope: string
        audience: string
        expires_at: u64
        revoked: bool
      rate_limit: "100/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        Validate an application-layer certificate and return its metadata.
        Lightweight check that does not extend the certificate validity.
        Used by internal services for certificate introspection.

    # --- 1.7 Get Server Trust ---
    - name: swarm_get_server_trust
      index: 7
      category: csr_lifecycle
      input_schema: {}
      output_schema:
        server_id: string
        root_ca_fingerprint: string
        intermediate_ca_fingerprint: string
        supported_algorithms: "[string]"
        supported_audiences: "[string]"
      rate_limit: "30/min"
      required_scope: "none"
      subject_source: none
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        Return server trust anchor information. Used by new clients on first
        connection to verify the server identity via TOFU (Trust On First Use)
        or explicit pinning. Client compares returned fingerprint against the
        server's declared root CA.

# =============================================================================
# 2. Device Registration & Recovery Tools — 5 tools
# =============================================================================
device_recovery_tools:
  description: >
    Device registration, passkey, recovery, and federation identity tools.
    Devices must be registered before they can hold certificates.
    Recovery paths (passkey, email, admin reset) provide bootstrap for
    initial CSR submission or private key loss recovery.
  total_tools: 5

  tools:
    # --- 2.1 Device Register ---
    - name: swarm_device_register
      index: 1
      category: device
      input_schema:
        device_id: string
        device_name: string
        device_fingerprint: string
        public_key: string
        metadata: DeviceMetadata
      output_schema:
        registered: bool
        device_id: string
        registration_time: u64
      rate_limit: "30/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: idempotent_mutation
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        Register a new device for the authenticated player. Devices must be
        registered before they can hold certificates. Per-player device cap:
        10 devices, 5 active certificates.

    # --- 2.2 Device List ---
    - name: swarm_device_list
      index: 2
      category: device
      input_schema: {}
      output_schema:
        devices: >
          [{device_id, device_name, registered_at, last_seen, status,
          active_certificates}]
      rate_limit: "30/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        List all registered devices for the authenticated player.

    # --- 2.3 Passkey Registration ---
    - name: swarm_passkey_register
      index: 3
      category: recovery
      input_schema:
        passkey_credential: string
      output_schema:
        registered: bool
        credential_id: string
      rate_limit: "10/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: idempotent_mutation
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "cli-rest"
      description: >
        Register a WebAuthn passkey for account recovery. Used to bootstrap
        a new CSR submission after private key loss.

    # --- 2.4 Recovery Email Bind ---
    - name: swarm_recovery_email_bind
      index: 4
      category: recovery
      input_schema:
        email: string
      output_schema:
        bound: bool
        verification_sent: bool
      rate_limit: "5/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: idempotent_mutation
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        Bind a recovery email to the player account. Sends verification link.
        Recovery email can be used to generate a recovery link for CSR
        re-submission after private key loss.

    # --- 2.5 Federation Identity ---
    - name: swarm_federation_identity
      index: 5
      category: federation
      input_schema:
        target_server_id: string
      output_schema:
        federation_token: string
        target_player_id: PlayerId
        expires_at: u64
      rate_limit: "5/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: idempotent_mutation
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        Request a federation identity token for cross-server identity mapping.
        player_id = blake3("federation:" + source_server_id + ":" +
        source_player_id). FederationCertificate bridges identity across
        cooperating servers.

# =============================================================================
# 3. Application-Layer Certificate Types
# =============================================================================
certificate_types:
  description: >
    Swarm uses application-layer certificates (Ed25519) signed by the server's
    Intermediate CA. These are carried in HTTP/MCP/WebSocket headers, NOT in
    TLS client certificates. Swarm CA is never installed in system/browser
    trust stores.

  types:
    - type: ClientAuthCertificate
      usage: "client_auth"
      audience_scope: "swarm-aud-v1:<transport>:<server_id>:<world_id>:<player_id>"
      ttl: "15 min–180 days"
      renewal: "swarm_renew_certificate"
      description: >
        Carried in Swarm-Certificate-Chain header. Validated via canonical
        request signature (SWARM-REQUEST-V1). Used for MCP queries, session
        renewal, and general authenticated requests.

    - type: CodeSigningCertificate
      usage: "code_signing"
      audience_scope: "swarm-aud-v1:wasm-sdk:<server_id>:<world_id>:<player_id>"
      ttl: "30–180 days (default 30d)"
      renewal: "swarm_renew_certificate"
      description: >
        Signs module_hash + metadata for WASM deployment. Validated at deploy
        time. Expired CodeSigningCertificate does NOT invalidate already-deployed
        modules. Compromised cert revocation may freeze or rollback modules.

    - type: AdminCertificate
      usage: "admin"
      audience_scope: "swarm-aud-v1:cli-rest:<server_id>:<world_id>:<admin_id>"
      ttl: "15 min–1h"
      renewal: "manual only (no auto-renew)"
      description: >
        Administrative operations (cert revocation, CA policy, bans).
        Hardware key preferred. Sensitive operations require dual-signature.
        Cannot be issued to temporary_device or managed_device profiles.

    - type: FederationCertificate
      usage: "federation"
      audience_scope: "swarm-aud-v1:federation:<source_server>:<target_server>:<player_id>"
      ttl: "24h"
      renewal: "re-federate per session"
      description: >
        Cross-server identity bridge. Subject to federation trust policy
        between cooperating servers.

  per_certificate_metadata:
    - cert_id: string
    - usage: string
    - audience: string
    - scope: string
    - public_key_fingerprint: string
    - device_label: string
    - managed_by_server: bool
    - issued_at: u64
    - expires_at: u64
    - revoked_at: u64

  per_player_limits:
    max_active_certificates: 10
    max_active_devices: 5

# =============================================================================
# 4. Canonical Request Signature — SWARM-REQUEST-V1
# =============================================================================
canonical_request_signature:
  description: >
    Every authenticated request carries a canonical Ed25519 signature over a
    SWARM-REQUEST-V1 payload. The signature is in the Swarm-Signature header.
    The certificate chain is in the Swarm-Certificate-Chain header.

  headers:
    - "Swarm-Certificate-Chain: <base64 leaf + intermediate>"
    - "Swarm-Cert-Id: <certificate_id>"
    - "Swarm-Timestamp: <unix_ms>"
    - "Swarm-Nonce: <random 128-bit>"
    - "Swarm-Signature: <ed25519 signature by user private key>"

  signature_payload:
    format: "SWARM-REQUEST-V1\nmethod: <v>\npath: <v>\nbody_hash: <v>\ntimestamp: <v>\nnonce: <v>\ncertificate_id: <v>\nplayer_id: <v>\naudience: <v>\n"
    fields:
      - "method: HTTP method or MCP tool name"
      - "path: HTTP path or MCP tool name"
      - "body_hash: blake3 canonical body hash (blake3('') for empty body)"
      - "timestamp: unix_ms as decimal string"
      - "nonce: random 128-bit hex"
      - "certificate_id: cert_id from issued certificate"
      - "player_id: authenticated player ID"
      - "audience: swarm-aud-v1:<transport>:<server_id>:<world_id>:<player_id>"
    encoding: "UTF-8, LF line endings, no BOM"
    algorithm: Ed25519

  validation_order:
    - "1. Certificate chain traces to server trust root, not expired, not revoked"
    - "2. Leaf certificate usage covers current operation"
    - "3. Swarm-Signature verifiable by leaf certificate's Ed25519 public key"
    - "4. Timestamp within allowed window (default 60s)"
    - "5. Nonce not previously consumed"
    - "6. Scope covers operation, audience/world_id match"

  transport_labels:
    agent-mcp: "AI agent via MCP session"
    cli-rest: "Human CLI or REST client"
    wasm-sdk: "WASM SDK (deploy, code signing)"

# =============================================================================
# 5. RejectionReason — 12 canonical auth codes
# =============================================================================
rejection_reason:
  description: >
    All auth-specific rejection reasons. These 12 canonical codes form the
    stable wire enum for certificate-chain authentication failures. Auth codes
    use the auth-specific namespace (1000+ index) to avoid collision with
    core game codes.
  total_canonical_codes: 12
  namespace_offset: 1000

  variants:
    - code: InvalidCertificate
      index: 1001
      description: "Certificate chain invalid, untrusted, or malformed"

    - code: CertExpired
      index: 1002
      description: "Certificate has expired"

    - code: CertRevoked
      index: 1003
      description: "Certificate has been explicitly revoked (CRL)"

    - code: NotAuthorized
      index: 1004
      description: "Principal lacks required scope for this operation"

    - code: ScopeInsufficient
      index: 1005
      description: "Certificate scope narrower than required for operation"

    - code: DeviceNotRegistered
      index: 1006
      description: "Device not found in trust registry"

    - code: DeviceLimitReached
      index: 1007
      description: "Per-player device cap reached (10 devices / 5 active certs)"

    - code: CertificateLimitReached
      index: 1008
      description: "Per-player active certificate cap reached (10 certs)"

    - code: InvalidCSR
      index: 1009
      description: "CSR signature, PoW proof, or payload validation failed"

    - code: UnknownCredential
      index: 1010
      description: "Credential or certificate type not recognized"

    - code: RateLimited
      index: 1011
      description: "Auth endpoint rate limit exceeded"

    - code: InternalAuthError
      index: 1012
      description: "Internal auth subsystem error (CA, FDB, or token store)"

  debug_detail:
    description: >
      Non-canonical, human-readable detail string providing context. NOT part
      of the RejectionReason wire enum — separate string payload.
    max_length: 512
    unit: "bytes"

# =============================================================================
# 6. Auth Tick Trace Events
# =============================================================================
auth_trace_events:
  description: >
    Auth-specific events emitted into tick trace stream. Recorded for audit,
    security monitoring, and replay integrity. Auth events do NOT affect game
    state.
  total_event_types: 8

  events:
    - name: auth_csr_submit
      index: 1
      fields:
        - { name: tick, type: u64 }
        - { name: player_id, type: PlayerId }
        - { name: username, type: string }
        - { name: certificate_profile, type: string }
        - { name: ip_address, type: string }
        - { name: success, type: bool }
        - { name: rejection_code, type: string }
      replay_class: non_replayable
      description: "Emitted on swarm_submit_csr"

    - name: auth_cert_issue
      index: 2
      fields:
        - { name: tick, type: u64 }
        - { name: player_id, type: PlayerId }
        - { name: cert_id, type: string }
        - { name: usage, type: string }
        - { name: fingerprint, type: string }
        - { name: issued_at, type: u64 }
        - { name: expires_at, type: u64 }
      replay_class: admin_critical
      description: "Emitted when a certificate is issued"

    - name: auth_cert_renew
      index: 3
      fields:
        - { name: tick, type: u64 }
        - { name: player_id, type: PlayerId }
        - { name: old_cert_id, type: string }
        - { name: new_cert_id, type: string }
        - { name: new_fingerprint, type: string }
      replay_class: idempotent_mutation
      description: "Emitted on swarm_renew_certificate"

    - name: auth_cert_revoke
      index: 4
      fields:
        - { name: tick, type: u64 }
        - { name: actor_id, type: string }
        - { name: target_player_id, type: PlayerId }
        - { name: cert_id, type: string }
        - { name: reason, type: string }
      replay_class: admin_critical
      description: "Emitted on certificate revocation"

    - name: auth_device_register
      index: 5
      fields:
        - { name: tick, type: u64 }
        - { name: player_id, type: PlayerId }
        - { name: device_id, type: string }
        - { name: device_name, type: string }
        - { name: device_fingerprint, type: string }
      replay_class: idempotent_mutation
      description: "Emitted on swarm_device_register"

    - name: auth_recovery_bind
      index: 6
      fields:
        - { name: tick, type: u64 }
        - { name: player_id, type: PlayerId }
        - { name: recovery_type, type: string }
        - { name: success, type: bool }
      replay_class: non_replayable
      description: "Emitted on recovery email/passkey binding"

    - name: auth_rate_limit_hit
      index: 7
      fields:
        - { name: tick, type: u64 }
        - { name: endpoint, type: string }
        - { name: key_type, type: string }
        - { name: key_value, type: string }
        - { name: current_count, type: u32 }
        - { name: limit, type: u32 }
      replay_class: non_replayable
      description: "Emitted when an auth endpoint rate limit is exceeded"

    - name: auth_security_alert
      index: 8
      fields:
        - { name: tick, type: u64 }
        - { name: alert_type, type: string }
        - { name: severity, type: string }
        - { name: player_id, type: PlayerId }
        - { name: ip_address, type: string }
        - { name: detail, type: string }
      replay_class: non_replayable
      description: "Emitted when auth subsystem detects a security-relevant anomaly"

# =============================================================================
# 7. Auth Rate Limits
# =============================================================================
auth_rate_limits:
  description: "Authoritative rate limits for all auth endpoints."

  csr_limits:
    challenge: { limit: "10/min", key: per_ip, burst: 15 }
    submit_csr: { limit: "1/30s", key: per_ip, burst: 2 }
    renew: { limit: "5/min", key: per_player, burst: 8 }
    revoke: { limit: "5/min", key: per_player, burst: 8 }
    cert_list: { limit: "30/min", key: per_player, burst: 45 }
    cert_check: { limit: "100/min", key: per_player, burst: 150 }

  device_limits:
    register: { limit: "30/min", key: per_player, burst: 45 }
    list: { limit: "30/min", key: per_player, burst: 45 }
    max_devices_per_player: 10
    max_active_certificates_per_player: 10

  recovery_limits:
    passkey: { limit: "10/min", key: per_player }
    email_bind: { limit: "5/min", key: per_player }

  federation_limits:
    identity: { limit: "5/min", key: per_player }

  global_limits:
    max_concurrent_sessions_per_player: 5
    session_idle_timeout: "30m"
    session_absolute_timeout: "24h"
    certificate_validity_max: "365d"
    csr_challenge_ttl: "300s"
    csr_challenge_default_difficulty: 20
    failed_csr_lockout_threshold: 5
    failed_csr_lockout_window: "15m"
    failed_csr_lockout_duration: "30m"

# =============================================================================
# 8. Security Columns — Per-Tool Metadata
# =============================================================================
security_columns:
  description: >
    Every MCP/auth tool declaration includes these security columns.
    Canonical values defined here.

  columns:
    - name: required_scope
      values:
        - "none — pre-auth endpoints (challenge, submit_csr, server_trust)"
        - "swarm:auth — base auth scope (renew, revoke, cert_list, device ops)"
        - "swarm:read — read-only game data"
        - "swarm:deploy — WASM deployment (requires CodeSigningCertificate)"
        - "swarm:admin — administrative operations (cert governance, bans)"

    - name: subject_source
      values:
        - "none — pre-auth (no subject)"
        - "player_id — authenticated player from certificate"
        - "admin_id — authenticated administrator from AdminCertificate"

    - name: replay_class
      values:
        - "non_replayable — excluded from game-state replay (CSR, challenge)"
        - "read_replay_safe — read-only, safe to replay (check, list)"
        - "idempotent_mutation — stable result across replays (device register, renew)"
        - "non_idempotent_mutation — FDB transaction consumption (submit_csr)"
        - "admin_critical — MUST be replayed deterministically (revoke)"

    - name: visibility_filter
      values:
        - "none — no filtering"
        - "owner — only the authenticated player's own data"
        - "admin_scope — only visible to administrators"

    - name: rate_limit_key
      values:
        - "per_ip — tracked by client IP"
        - "per_player — tracked by authenticated player ID"
        - "per_admin — tracked by admin ID"
        - "global — shared across all callers"

    - name: transport
      description: "Audience transport labels for certificate audience field"
      values:
        - "agent-mcp — AI agent via MCP session"
        - "cli-rest — Human CLI or REST client"
        - "wasm-sdk — WASM SDK (deploy, code signing)"

# =============================================================================
# Changelog
# =============================================================================
changelog:
  - version: "0.2.0"
    date: "2026-06-21"
