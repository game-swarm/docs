      - "Replaced auth_mcp_tools (TLS cert rotate/issue/revoke) with device + recovery + federation tools"
      - "Updated all 12 RejectionReason codes for certificate model"
      - "Updated all 8 trace events for certificate model"
      - "Added canonical request signature specification (SWARM-REQUEST-V1)"
      - "Added certificate_types section (ClientAuth, CodeSigning, Admin, Federation)"
      - "Added transport labels (agent-mcp, cli-rest, wasm-sdk)"
      - "Removed: bearer token, refresh token, JWT envelope, TLS/mTLS cert management, RSA/ECDSA, OAuth2"
  - version: "0.1.0"
    date: "2026-06-18"
