# =============================================================================
# Auth API IDL — Machine-Readable Single Source of Truth
# =============================================================================
# Canonical source for auth subsystem codegen / SDK / CI. All other auth docs
# derive from this file. This file is validated by CI; do not edit generated
# Markdown tables directly.
#
# Per design/auth.md: CSR -> certificate -> credential -> session, Ed25519
# canonical request signatures, and scope labels.
# =============================================================================

api_version: "0.2.0"

csr_lifecycle_tools:
  description: >
    Core CSR registration and certificate lifecycle tools. All clients register
    via PoW challenge -> CSR submit -> certificate issuance before accessing
    protected resources. Application-layer certificates signed by the
    single-layer Server CA are the sole trust root. No bearer tokens, OAuth2,
    TLS/mTLS client certificates.
  total_tools: generated
  tools:
    - name: swarm_register_challenge
      index: 1
      category: csr_lifecycle
      input_schema: {}
      output_schema:
        challenge_id: string
        challenge: string
        difficulty_bits: u32
        expires_at: u64
      rate_limit: "10/min"
      required_scope: "none"
      subject_source: none
      replay_class: non_replayable
      visibility_filter: none
      rate_limit_key: per_ip
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: "Request a one-use PoW challenge for CSR registration."

    - name: swarm_submit_csr
      index: 2
      category: csr_lifecycle
      input_schema:
        username: string
        csr: string
        certificate_profile: string
        challenge_id: string
        nonce: string
        csr_signature: string
      output_schema:
        certificate_bundle:
          client_auth_cert: string
          code_signing_cert: string
          cert_id: string
          player_id: PlayerId
          public_key_fingerprint: string
          issued_at: u64
          expires_at: u64
      rate_limit: "1/30s"
      required_scope: "none"
      subject_source: none
      replay_class: non_idempotent_mutation
      visibility_filter: none
      rate_limit_key: per_ip
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: >
        Submit a CSR with PoW proof and Ed25519 csr_signature. Server validates
        admission, atomically consumes the challenge, creates or updates the
        player record, and issues ClientAuthCertificate plus
        CodeSigningCertificate via the Server CA.

    - name: swarm_renew_certificate
      index: 3
      category: csr_lifecycle
      input_schema:
        certificate_id: string
        renewal_csr: string
        proof_signature: string
      output_schema:
        certificate_bundle:
          client_auth_cert: string
          code_signing_cert: string
          cert_id: string
          issued_at: u64
          expires_at: u64
      rate_limit: "5/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: idempotent_mutation
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: "Renew certificates by proving possession of the same Ed25519 private key."

    - name: swarm_revoke_certificate
      index: 4
      category: csr_lifecycle
      input_schema:
        certificate_id: string
        reason: string
      output_schema:
        revoked: bool
        revocation_time: u64
        crl_updated: bool
      rate_limit: "5/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: admin_critical
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: "Self-service certificate revocation; admin revocation uses the audited admin path."

    - name: swarm_cert_list
      index: 5
      category: csr_lifecycle
      input_schema:
        status: string
      output_schema:
        certificates: "[{cert_id, usage, label, fingerprint, issued_at, expires_at, status}]"
      rate_limit: "30/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: "List certificates for the authenticated player."

    - name: swarm_cert_check
      index: 6
      category: csr_lifecycle
      input_schema:
        certificate_id: string
      output_schema:
        valid: bool
        certificate_id: string
        player_id: PlayerId
        client_public_key: string
        public_key_fingerprint: string
        usage: string
        scope: string
        audience: string
        expires_at: u64
        revoked: bool
      rate_limit: "100/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: "Validate an application-layer certificate and return issuer-verified stored certificate metadata, including the trusted client public key."

    - name: swarm_get_server_trust
      index: 7
      category: csr_lifecycle
      input_schema: {}
      output_schema:
        server_id: string
        server_ca_fingerprint: string
        server_ca_certificate: string
        supported_algorithms: "[string]"
        supported_audiences: "[string]"
      rate_limit: "30/min"
      required_scope: "none"
      subject_source: none
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global
      transport: "agent-mcp, cli-rest, wasm-sdk"
      description: "Return Server CA trust anchor information for TOFU or explicit pinning."

certificate_types:
  description: >
    Swarm uses exactly two application-layer certificate types signed by a
    single-layer Server CA. Admin authorization is a scope flag on
    ClientAuthCertificate, not a separate certificate type.
  types:
    - type: ClientAuthCertificate
      usage: "client_auth"
      audience_scope: "bound to cert_id, player_id, transport, and signed request payload"
      ttl: "default 24h; configurable 15min-7d"
      renewal: "swarm_renew_certificate"
      description: "Carries authenticated MCP, REST, and WebSocket requests using the frontend canonical request payload."
    - type: CodeSigningCertificate
      usage: "code_signing"
      audience_scope: "bound to cert_id, player_id, wasm-sdk usage, and signed deploy payload"
      ttl: "30-180d (default 30d)"
      renewal: "swarm_renew_certificate"
      description: "Signs SWARM-DEPLOY-V1 payloads for module deployment."
  per_certificate_metadata:
    - cert_id: string
    - usage: string
    - audience: string
    - scope: string
    - public_key_fingerprint: string
    - label: string
    - issued_at: u64
    - expires_at: u64
    - revoked_at: u64
  per_player_limits:
    max_active_certificates: 10
    max_active_client_auth_certificates: 10

canonical_request_signature:
  description: >
    Every authenticated request carries a canonical Ed25519 signature over a
    frontend canonical payload. The signature covers Swarm-Cert-Id; Gateway
    rejects requests where the header id does not match the certificate body.
  headers:
    - "Swarm-Certificate: <base64 ClientAuthCertificate or CodeSigningCertificate>"
    - "Swarm-Cert-Id: <certificate_id>"
    - "Swarm-Timestamp: <unix_ms>"
    - "Swarm-Nonce: <random 128-bit>"
    - "Swarm-Signature: <ed25519 signature by user private key>"
  signature_payload:
    format: "METHOD\nPATH\nTIMESTAMP\nNONCE\nCERTIFICATE_ID\nPLAYER_ID\nTICK\nBLAKE3(stable_json(body))"
    fields:
      - "METHOD: uppercase HTTP method"
      - "PATH: HTTP path or MCP endpoint path"
      - "TIMESTAMP: unix_ms as decimal string"
      - "NONCE: random 128-bit hex"
      - "CERTIFICATE_ID: Swarm-Cert-Id header and certificate body cert_id"
      - "PLAYER_ID: authenticated player ID"
      - "TICK: request tick header value or empty string"
      - "BLAKE3(stable_json(body)): hex BLAKE3 over recursive key-sorted stable JSON"
    encoding: "UTF-8, LF line endings, no BOM"
    algorithm: Ed25519
  validation_order:
    - "1. Certificate signed by Server CA, not expired, not revoked"
    - "2. Swarm-Cert-Id header equals cert_id in certificate body"
    - "3. Certificate usage covers current operation"
    - "4. Swarm-Signature verifies with certificate public key"
    - "5. Timestamp within allowed window"
    - "6. Nonce not previously consumed"
    - "7. Scope covers operation and audience/world_id match"
  transport_labels:
    agent-mcp: "AI agent via MCP session"
    cli-rest: "Human CLI or REST client"
    wasm-sdk: "WASM SDK for deploy and code signing"

deploy_canonical_signature:
  description: >
    SWARM-DEPLOY-V1 is signed by CodeSigningCertificate and binds the canonical
    deploy body, module hash, player identity, transport binding, deploy_id, and
    per-slot version_counter.
  signature_payload:
    format: "SWARM-DEPLOY-V1\nmethod: swarm_deploy\npath: /deploy\nbody_hash: <v>\ntimestamp: <v>\nnonce: <v>\ncertificate_id: <v>\nplayer_id: <v>\ntransport_binding: <v>\ndeploy_id: <v>\nmodule_hash: <v>\nversion_counter: <v>\n"
    fields:
      - "method: swarm_deploy"
      - "path: /deploy"
      - "body_hash: blake3 canonical deploy body hash"
      - "timestamp: unix_ms"
      - "nonce: random 128-bit hex"
      - "certificate_id: CodeSigningCertificate cert_id"
      - "player_id: deploying player"
      - "transport: wasm-sdk usage is bound by the certificate and deploy payload"
      - "deploy_id: unique deploy identifier"
      - "module_hash: blake3 of WASM module bytes"
      - "version_counter: per-player/per-slot deploy counter"
    encoding: "UTF-8, LF line endings, no BOM"
    algorithm: Ed25519
  validation:
    - "1. Certificate is CodeSigningCertificate, not expired, not revoked"
    - "2. SWARM-DEPLOY-V1 signature verifies with certificate public key"
    - "3. module_hash matches submitted module bytes"
    - "4. deploy_id is unique for the player"
    - "5. version_counter is greater than the stored slot counter"
    - "6. Timestamp within window and nonce not consumed"
    - "7. certificate usage, player, and wasm-sdk transport binding match the deploy payload"
  replay_protection:
    mechanism: "redb manifest transaction + per-slot version_counter + deploy_id uniqueness"
    description: "The accepted deploy manifest is written atomically with the version counter update."

rejection_reason:
  description: >
    Auth-specific rejection reasons. These 9 canonical codes form the stable
    wire enum for certificate authentication failures.
  total_canonical_codes: 9
  namespace_offset: 1000
  variants:
    - { code: InvalidCertificate, index: 1001, description: "Certificate invalid, untrusted, malformed, or header/body mismatch" }
    - { code: CertExpired, index: 1002, description: "Certificate has expired" }
    - { code: CertRevoked, index: 1003, description: "Certificate has been revoked" }
    - { code: NotAuthorized, index: 1004, description: "Principal lacks required authorization" }
    - { code: ScopeInsufficient, index: 1005, description: "Certificate scope narrower than required" }
    - { code: CertificateLimitReached, index: 1006, description: "Per-player active certificate cap reached" }
    - { code: InvalidCSR, index: 1007, description: "CSR signature, PoW proof, or payload validation failed" }
    - { code: RateLimited, index: 1008, description: "Auth endpoint rate limit exceeded" }
    - { code: InternalAuthError, index: 1009, description: "Internal auth subsystem error" }
  debug_detail:
    max_length: 512
    unit: "bytes"

auth_trace_events:
  description: "Auth-specific audit events emitted into the tick trace stream."
  total_event_types: 7
  events:
    - { name: auth_csr_submit, index: 1, replay_class: non_replayable, description: "Emitted on swarm_submit_csr" }
    - { name: auth_cert_issue, index: 2, replay_class: admin_critical, description: "Emitted when a certificate is issued" }
    - { name: auth_cert_renew, index: 3, replay_class: idempotent_mutation, description: "Emitted on swarm_renew_certificate" }
    - { name: auth_cert_revoke, index: 4, replay_class: admin_critical, description: "Emitted on certificate revocation" }
    - { name: auth_recovery_bind, index: 5, replay_class: non_replayable, description: "Emitted on optional recovery binding" }
    - { name: auth_rate_limit_hit, index: 6, replay_class: non_replayable, description: "Emitted when an auth endpoint rate limit is exceeded" }
    - { name: auth_security_alert, index: 7, replay_class: non_replayable, description: "Emitted on security-relevant auth anomaly" }

auth_rate_limits:
  description: "Authoritative rate limits for all auth endpoints."
  csr_limits:
    challenge: { limit: "10/min", key: per_ip, burst: 15 }
    submit_csr: { limit: "1/30s", key: per_ip, burst: 2 }
    renew: { limit: "5/min", key: per_player, burst: 8 }
    revoke: { limit: "5/min", key: per_player, burst: 8 }
    cert_list: { limit: "30/min", key: per_player, burst: 45 }
    cert_check: { limit: "100/min", key: per_player, burst: 150 }
    server_trust: { limit: "30/min", key: global, burst: 45 }
  global_limits:
    max_concurrent_sessions_per_player: 5
    session_idle_timeout: "30m"
    session_absolute_timeout: "24h"
    client_auth_certificate_default_ttl: "24h"
    client_auth_certificate_min_ttl: "15min"
    client_auth_certificate_max_ttl: "7d"
    code_signing_certificate_default_ttl: "30d"
    csr_challenge_ttl: "300s"
    csr_challenge_default_difficulty: 20

security_columns:
  description: "Every auth tool declaration includes these security columns."
  columns:
    - name: required_scope
      values:
        - "none"
        - "swarm:auth"
        - "swarm:read"
        - "swarm:deploy"
        - "swarm:debug"
        - "swarm:admin"
    - name: subject_source
      values: ["none", "player_id", "admin_id", "world", "drone_id"]
    - name: replay_class
      values: ["non_replayable", "read_replay_safe", "idempotent_mutation", "non_idempotent_mutation", "admin_critical", "deploy_mutation"]
    - name: visibility_filter
      values: ["none", "owner", "admin_scope", "fog_of_war", "owner_or_visible", "arena_only"]
    - name: transport
      values: ["agent-mcp", "cli-rest", "wasm-sdk", "browser-http", "agent-ws", "spectator-ws"]
