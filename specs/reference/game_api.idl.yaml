# =============================================================================
# Game API IDL — Machine-Readable Single Source of Truth
# =============================================================================
# Machine-readable documentation reference. Keep it synchronized manually with
# api-registry.md; Engine runtime IDL extraction does not read this file.
# =============================================================================

api_version: "0.4.0"

version_domains:
  GAME_API_VERSION: "0.4.0"
  AUTH_API_VERSION: "0.3.0"
  ECONOMY_API_VERSION: "0.1.1"
  PLUGIN_ABI_VERSION: "2"
  independence: >
    These domains are explicit and independent. Do not infer Auth, Economy,
    Plugin ABI, SDK package, or implementation crate versions from GAME_API_VERSION.

# =============================================================================
# Type Registry — fixed-point integer types replacing f64
# =============================================================================
# All f64 fields have been replaced with fixed-point integer representations
# to guarantee deterministic cross-platform behavior.
#
#   ResourceRate_i64  — i64, units of 1e-6 resources per tick  (micro_rate)
#   ProgressBps_i64   — i64, basis points (1 bp = 0.01%)         (bps)
#   BasisPoints       — u32, 0–10000 = 0%–100%                   (fixed-point %)
#   EfficiencyBps     — u32, 0–10000 = 0%–100%                   (fixed-point %)
#   ConfidenceBps     — u32, 0–10000                              (fixed-point %)
#   milli_distance     — i64, units of 1e-3 cells                 (distance)
#   micro_cost         — u64, units of 1e-6 resource units        (cost)
#
type_registry:
  scalar_types:
    ObjectId:
      base: EntityId
      constraints: "actor-scoped entity identifier"
    ResourceName:
      base: string
      constraints: "case-sensitive configured resource identifier; Vanilla canonical value is Energy"
    OmittedCategoryBucket:
      type: enum
      values: ["0", few, some, many, extreme]
    OmittedCategories:
      type: object
      fields:
        entities: OmittedCategoryBucket
        terrain: OmittedCategoryBucket
        resources: OmittedCategoryBucket
        events: OmittedCategoryBucket
        messages: OmittedCategoryBucket
    OverloadPressure:
      type: object
      fields:
        total: "u32 (optional; omitted unless caller is target owner or contributing attacker)"
        contributions: "[{source_entity_id: EntityId, amount: u32}]"
        tick_snapshot: u64
      visibility: "optional; filtered per caller. Target owner and contributing attacker see total; third parties see visible-source contributions only and no total; omitted when nothing relevant is visible."
    ActionPayload:
      type: discriminated_payload
      selected_by: "CommandAction::Action.action_type"
      wire_discriminator: type
      flatten_wire: true
      additional_properties: false
      schema_sources:
        vanilla: "command_action.action_registry.vanilla_actions.actions[].parameters"
        custom: "enabled signed-plugin WorldActionManifest.actions[].payload_schema"
      codec: "IDL-generated Swarm codec concrete payload selected by action_type; JSON and free-form maps are forbidden"
    CombatConfig:
      type: object
      fields:
        pvp_enabled: bool
        friendly_fire: bool
        damage_multiplier: BasisPoints
        repair_hp_per_work_part: "u32 (>0; Vanilla default 5)"
        repair_energy_per_hp: "u32 (>0; Vanilla default 1 Energy per accepted HP)"
      hash_semantics: "Resolved after profile defaults/overrides and included in replay-critical world_config_hash."
    HackActionConfig:
      type: object
      fields:
        enabled: bool
        body_parts: "[BodyPart] (Vanilla Claim)"
        damage_type: "DamageType (Vanilla Psionic)"
        resistance: "DamageType (Vanilla Psionic)"
        energy_cost: "u32 (Vanilla 1000)"
        player_global_cooldown: "u32 (Vanilla 200 ticks)"
        range: "u32 (Vanilla 1)"
        channel_time: "u32 (Vanilla 5 ticks; interruptible control-lock channel)"
        control_lock_ticks: "u32 (Vanilla 5)"
    DrainActionConfig:
      type: object
      fields:
        enabled: bool
        body_parts: "[BodyPart] (Vanilla Work, Carry)"
        damage_type: "DamageType (Vanilla EMP)"
        resistance: "DamageType (Vanilla EMP)"
        energy_cost_per_tick: "u32 (Vanilla 200)"
        source_drone_cooldown: "u32 (Vanilla 50 ticks)"
        range: "u32 (Vanilla 1)"
        channel_time: "u32 (Vanilla 0)"
        transfer_per_tick: "enum (Vanilla carry_capacity)"
    OverloadActionConfig:
      type: object
      fields:
        enabled: bool
        body_parts: "[BodyPart] (Vanilla RangedAttack)"
        damage_type: "DamageType (Vanilla EMP)"
        resistance: "DamageType (Vanilla EMP)"
        source_drone_cooldown: "u32 (Vanilla 200 ticks)"
        target_player_global_cooldown: "u32 (Vanilla 50 ticks)"
        range: "u32 (Vanilla 5)"
        channel_time: "u32 (Vanilla 0)"
        energy_cost: "u32 (Vanilla 300)"
        fuel_pressure: "u64 (Vanilla 500000)"
        min_budget_bps: "BasisPoints (Vanilla 2000)"
    DebilitateActionConfig:
      type: object
      fields:
        enabled: bool
        body_parts: "[BodyPart] (Vanilla Work)"
        damage_type: "DamageType (Vanilla Corrosive)"
        resistance: "DamageType (Vanilla Corrosive)"
        energy_cost: "u32 (Vanilla 200)"
        source_drone_cooldown: "u32 (Vanilla 150 ticks)"
        range: "u32 (Vanilla 3)"
        channel_time: "u32 (Vanilla 0)"
        resistance_multiplier_bps: "u32 fixed-bps multiplier (Vanilla 20000 = 2.0)"
        duration: "u32 (Vanilla 50 ticks)"
    DisruptActionConfig:
      type: object
      fields:
        enabled: bool
        body_parts: "[BodyPart] (Vanilla Attack)"
        damage_type: "DamageType (Vanilla Sonic)"
        resistance: "DamageType (Vanilla Sonic)"
        energy_cost: "u32 (Vanilla 100)"
        source_drone_cooldown: "u32 (Vanilla 50 ticks)"
        range: "u32 (Vanilla 1)"
        channel_time: "u32 (Vanilla 0)"
        interrupt_channel: bool
    FortifyActionConfig:
      type: object
      fields:
        enabled: bool
        body_parts: "[BodyPart] (Vanilla Tough)"
        damage_type: "DamageType (Vanilla None)"
        resistance: "DamageType (Vanilla None)"
        energy_cost: "u32 (Vanilla 400)"
        source_drone_cooldown: "u32 (Vanilla 300 ticks)"
        target_recipient_cooldown: "u32 (Vanilla 300 ticks)"
        range: "u32 (Vanilla 1)"
        channel_time: "u32 (Vanilla 0)"
        resistance_multiplier_bps: "BasisPoints (Vanilla 5000)"
        cleanse_negative_status: bool
        duration: "u32 (Vanilla 100 ticks)"
    LeechActionConfig:
      type: object
      fields:
        enabled: bool
        body_parts: "[BodyPart] (Vanilla Attack)"
        damage_type: "DamageType (Vanilla Kinetic)"
        resistance: "DamageType (Vanilla Kinetic)"
        energy_cost: "u32 (Vanilla 300)"
        source_drone_cooldown: "u32 (Vanilla 100 ticks)"
        range: "u32 (Vanilla 1)"
        channel_time: "u32 (Vanilla 0)"
        base_damage: "u32 (Vanilla 15)"
        heal_from_actual_hp_damage_bps: "BasisPoints (Vanilla 5000)"
    FabricateActionConfig:
      type: object
      fields:
        enabled: bool
        body_parts: "[BodyPart] (Vanilla Work, Carry)"
        damage_type: "DamageType (Vanilla None)"
        resistance: "DamageType (Vanilla None)"
        allowed_output_structures: "[StructureType] (ordered, non-empty; Vanilla Tower, Storage, Wall)"
        canonical_default: "StructureType (Vanilla Tower)"
        source_drone_cooldown: "u32 (Vanilla 500 ticks)"
        range: "u32 (Vanilla 1)"
        energy_cost: "u32 (Vanilla 5000)"
        channel_time: "u32 (Vanilla 5 ticks)"
    SpecialAttacksConfig:
      type: object
      fields:
        special_attacks_enabled: bool
        hack: HackActionConfig
        drain: DrainActionConfig
        overload: OverloadActionConfig
        debilitate: DebilitateActionConfig
        disrupt: DisruptActionConfig
        fortify: FortifyActionConfig
        leech: LeechActionConfig
        fabricate: FabricateActionConfig
      hash_semantics: "Resolved strict action config is included in replay-critical world_config_hash."
  fixed_point_types:
    ResourceRate_i64:
      base_type: i64
      scale: 1_000_000  # 1e6
      description: "Resource rate in micro-units per tick (1.0 = 1_000_000)"
    ProgressBps_i64:
      base_type: i64
      scale: 10_000   # basis points
      description: "Progress in basis points (100.00% = 10_000)"
    BasisPoints:
      base_type: u32
      range: "0..10000"
      description: "Percentage in basis points (50% = 5000)"
    EfficiencyBps:
      base_type: u32
      range: "0..10000"
      description: "Efficiency in basis points"
    ConfidenceBps:
      base_type: u32
      range: "0..10000"
      description: "Confidence in basis points"
    milli_distance:
      base_type: i64
      scale: 1_000  # 1e3
      description: "Distance in milli-cell units (1 cell = 1000)"
    micro_cost:
      base_type: u64
      scale: 1_000_000  # 1e6
      description: "Cost in micro resource units (1.0 = 1_000_000)"

  enum_types:
    StructureType:
      description: >
        Vanilla structure allowlist. The 13 core types are enabled by default;
        the 4 optional types are enabled only when world.toml
        optional_structure_types explicitly lists the name. Plugin-defined
        structures are registered through a plugin-owned typed StructureType extension
        schema and surfaced by runtime IDL. PluginSettlement is used only for the
        resulting economy ledger legs, not for structure registration.
      core:
        - Spawn
        - Extension
        - Tower
        - Storage
        - Link
        - Extractor
        - Lab
        - Terminal
        - Observer
        - PowerSpawn
        - Factory
        - Nuker
        - Depot
      optional_allowlist:
        default: []
        allowed_values: [Road, Wall, Rampart, Container]

# =============================================================================
# 1. CommandAction — 14 variants (+ Action system)
# =============================================================================
# All 11 combat actions (Attack, RangedAttack, Heal, Hack, Drain,
# Overload, Debilitate, Disrupt, Fortify, Leech, Fabricate) moved to
# ActionRegistry. CommandAction retains only non-combat fundamental operations.
command_intent:
  type: object
  additional_properties: false
  required: [sequence, idempotency_key, action]
  fields:
    sequence: u32
    idempotency_key: string
    client_trace_id: "string | null"
    action: CommandAction

command_action:
  description: "Core CommandAction enum. WASM tick() output CommandIntent action types. Combat/effect actions dispatched via ActionRegistry."
  total_variants: 14
  variants:
    # --- 1.1 Core (11) ---
    - name: Move
      index: 1
      category: core
      parameters:
        - name: object_id
          type: ObjectId
          required: true
        - name: direction
          type: Direction
          required: true
      description: "Move one cell in a cardinal grid direction"

    - name: Harvest
      index: 2
      category: core
      parameters:
        - name: object_id
          type: ObjectId
          required: true
        - name: target_id
          type: EntityId
          required: true
        - name: resource
          type: ResourceName
          required: false
      description: "Harvest a resource from target"

    - name: Transfer
      index: 3
      category: core
      parameters:
        - name: object_id
          type: ObjectId
          required: true
        - name: target_id
          type: EntityId
          required: true
        - name: resource
          type: ResourceName
          required: true
        - name: amount
          type: u32
          required: true
      description: "Transfer resources locally to target"

    - name: Withdraw
      index: 4
      category: core
      parameters:
        - name: object_id
          type: ObjectId
          required: true
        - name: target_id
          type: EntityId
          required: true
        - name: resource
          type: ResourceName
          required: true
        - name: amount
          type: u32
          required: true
      description: "Withdraw resources from structure"

    - name: Action
      index: 5
      category: core
      parameters:
        - name: action_type
          type: string
          required: true
          description: "Action type key registered in ActionRegistry"
        - name: object_id
          type: ObjectId
          required: true
        - name: payload
          type: ActionPayload
          required: true
          description: "Closed type-specific payload selected by action_type; concrete fields are flattened after type/object_id on the wire"
      description: "Execute a registered action via ActionRegistry dispatch. Custom-action wire serialization uses the action_type string as the command type and the signed manifest payload schema."

    - name: ClaimController
      index: 6
      category: core
      parameters:
        - name: object_id
          type: ObjectId
          required: true
        - name: target_id
          type: EntityId
          required: true
      description: "Claim a room controller"

    - name: Spawn
      index: 7
      category: core
      parameters:
        - name: object_id
          type: ObjectId
          required: true
        - name: spawn_id
          type: SpawnId
          required: true
        - name: body_parts
          type: "[BodyPart]"
          required: true
      description: "Spawn a drone with given body parts"

    - name: Recycle
      index: 8
      category: core
      parameters:
        - name: object_id
          type: ObjectId
          required: true
      description: "Recycle own drone (self-action — no spawn proximity required)"

    - name: Build
      index: 9
      category: core
      parameters:
        - name: object_id
          type: ObjectId
          required: true
        - name: structure
          type: StructureType
          required: true
        - name: x
          type: i32
          required: true
        - name: y
          type: i32
          required: true
      description: "Build a structure at (x,y)"

    - name: Repair
      index: 10
      category: core
      parameters:
        - name: object_id
          type: ObjectId
          required: true
        - name: target_id
          type: EntityId
          required: true
      description: "Repair or heal target"

    - name: UpgradeController
      index: 11
      category: core
      parameters:
        - name: object_id
          type: ObjectId
          required: true
        - name: target_id
          type: EntityId
          required: true
      description: "Upgrade a room controller"

    # --- 1.2 Global Storage (2) ---
    - name: TransferToGlobal
      index: 12
      category: global_storage
      parameters:
        - name: resource
          type: ResourceName
          required: true
        - name: amount
          type: u32
          required: true
      description: "Deposit resources to global storage"

    - name: TransferFromGlobal
      index: 13
      category: global_storage
      parameters:
        - name: resource
          type: ResourceName
          required: true
        - name: amount
          type: u32
          required: true
      description: "Withdraw resources from global storage"

    # --- 1.3 Allied transfer (1) ---
    - name: AlliedTransfer
      index: 14
      category: global_storage
      parameters:
        - name: target_player
          type: PlayerId
          required: true
        - name: resource
          type: ResourceName
          required: true
        - name: amount
          type: u32
          required: true
      description: "Transfer resources to another player through delayed allied transfer rules"

  # =============================================================================
  # ActionRegistry — 11 vanilla + mod-extensible combat/effect actions
  # =============================================================================
  action_registry:
    description: "All combat and effect actions. 11 vanilla actions built-in (immutable). Enabled signed plugins register additional actions without touching CommandAction enum."
    total_vanilla: 11
    registration:
      description: "Enabled signed plugins declare non-reserved actions and closed payload schemas in their package World Action Manifest, then install matching handlers through fixed ActionRegistry hooks."
      authority: "verified .swarm-mod package + mods.lock + signed World Action Manifest + fixed-hook handler registration"
      conflict_resolution: "Vanilla names are reserved and cannot be overridden by mods."

    vanilla_actions:
      description: >
        11 built-in combat/effect actions. Canonical wire fields are listed here;
        gameplay parameters come from typed world config with Vanilla
        design-profile defaults, and are summarized in specs/reference/special-attack-table.md.
        Implementations must not define conflicting fixed resistance or effect values here.
      actions:
        - type: Attack
          index: 14
          category: basic_combat
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Melee attack target"
          config_schema_ref: "mods.combat-core.actions.Attack"
          hp_effect: "Writes PendingDamage only; damage_multiplier applies only to actual HP damage."

        - type: RangedAttack
          index: 15
          category: basic_combat
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Ranged attack target"
          config_schema_ref: "mods.combat-core.actions.RangedAttack"
          hp_effect: "Writes PendingDamage only; damage_multiplier applies only to actual HP damage."

        - type: Heal
          index: 16
          category: basic_combat
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Heal or repair HP only; does not reduce drone age."
          config_schema_ref: "mods.combat-core.actions.Heal"
          hp_effect: "Writes PendingHeal only. Healer body parts cannot repair age."

        - type: Hack
          index: 17
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "5-stage intrusion attack"
          config_schema_ref: "mods.special-attacks.actions.Hack"

        - type: Drain
          index: 18
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Continuously drain resources from target"
          config_schema_ref: "mods.special-attacks.actions.Drain"

        - type: Overload
          index: 19
          category: special_attack
          parameters:
            - name: target_id
              type: PlayerId
              required: true
          description: "Reduce target player fuel budget"
          config_schema_ref: "mods.special-attacks.actions.Overload"

        - type: Debilitate
          index: 20
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
            - name: damage_type
              type: DamageType
              required: true
          description: "Apply damage-type resistance vulnerability: configured resistance multiplier 20000 bps for 50 ticks"
          config_schema_ref: "mods.special-attacks.actions.Debilitate"

        - type: Disrupt
          index: 21
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Interrupt target operation"
          config_schema_ref: "mods.special-attacks.actions.Disrupt"

        - type: Fortify
          index: 22
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Strengthen own defenses"
          config_schema_ref: "mods.special-attacks.actions.Fortify"

        - type: Leech
          index: 23
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Life-drain attack — deal Kinetic damage and heal self for 50% of damage dealt"
          config_schema_ref: "mods.special-attacks.actions.Leech"
          hp_effect: "Self-heal is based only on actual HP damage after armor/resistance/shield mitigation."

        - type: Fabricate
          index: 24
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Convert enemy drone into a configured friendly structure — requires 5-tick channel"
          config_schema_ref: "mods.special-attacks.actions.Fabricate"
          output_structure_resolution: "No wire parameter. Deterministic from typed world config ordered allowlist [Tower, Storage, Wall]; canonical default is first enabled type Tower. Invalid/empty config rejected during world-config validation; resolved type enters world_config_hash, FabricateState, TickTrace/replay."

# 2. RejectionReason — canonical wire enum + debug_detail
# =============================================================================
rejection_reason:
  description: >
    All command rejection reasons. Covers Pipeline, Validation, MCP, and Runtime layers.
    Canonical codes are the wire enum. Detailed contextual information
    (e.g. NotMovable, Fatigued, specific target state) goes into the `debug_detail` field,
    NOT into additional RejectionReason enum variants. This keeps the wire enum stable
    while providing rich debugging data.
  total_canonical_codes: 37
  debug_detail:
    description: >
      Non-canonical, human-readable detail string providing context beyond the
      canonical codes. Examples: "NotMovable: encumbered by 3 units", "Fatigued:
      action cooldown 12 ticks remaining", "PathBlocked: obstacle at (5,3)".
      This field is NOT part of the RejectionReason wire enum — it is a separate
      string payload that does not affect replay determinism.
    max_length: 512
    unit: "bytes"
  detail_level:
    description: >
      Controls the verbosity of debug_detail in rejection responses. Allows
      operators to tune information leakage vs debugging utility.
    enum:
      - value: competitive
        description: "Minimal detail — only canonical code, no debug_detail. Tournament/ladder mode."
      - value: practice
        description: "Moderate actor-authorized detail with actionable hints; never reveals hidden state."
      - value: training
        description: "Detailed actor-authorized state and path traces; never reveals RNG state, secrets, hidden entities, or another player's private state."
    default: competitive

  variants:
    # --- 2.1 Pipeline-level (pre-processing, not in enum proper) ---
    - code: InvalidJson
      layer: pipeline
      description: "JSON parsing failed"
    - code: SchemaViolation
      layer: pipeline
      description: "Command schema does not conform to IDL"

    # --- 2.2 Validation-level ---
    - code: ObjectNotFound
      layer: validation
      index: 1
      description: "Target entity does not exist"
    - code: NotOwner
      layer: validation
      index: 2
      description: "Not the owner of the target entity"
    - code: InsufficientResource
      layer: validation
      index: 3
      description: "Insufficient resources for operation"
      note: "Unified singular form; deprecated: InsufficientResources, InsufficientEnergy"
    - code: OutOfRange
      layer: validation
      index: 4
      description: "Target is beyond operation range"
    - code: NotStructure
      layer: validation
      index: 5
      description: "Target is not a structure"
    - code: NotController
      layer: validation
      index: 6
      description: "Target is not a controller"
    - code: NotVisibleOrNotFound
      layer: validation
      index: 7
      description: "Target not visible or does not exist (merged to prevent oracle inference)"
    - code: TargetNotVisible
      layer: validation
      index: 8
      description: "Target is not in field of view"
      visibility_note: "Internal/admin classification only; player-facing mapping is NotVisibleOrNotFound."
    - code: SpawnOnCooldown
      layer: validation
      index: 9
      description: "Spawn is on cooldown"
    - code: RoomDroneCapReached
      layer: validation
      index: 10
      description: "Room drone capacity reached"
    - code: AuthContextInvalid
      layer: validation
      index: 11
      description: "Authentication context is invalid"
    - code: CooldownActive
      layer: validation
      index: 12
      description: "Operation cooldown is active"
      note: "Generic cooldown; SpawnOnCooldown reserved for Spawn-specific"
    - code: InvalidDirection
      layer: validation
      index: 13
      description: "Direction is not one of the 4 valid directions"
    - code: PositionOccupied
      layer: validation
      index: 14
      description: "Target position is occupied"
    - code: ConstructionLimitReached
      layer: validation
      index: 15
      description: "Structure construction limit reached"
    - code: SafeModeActive
      layer: validation
      index: 16
      description: "Target is in safe mode"
      visibility_note: "Internal/admin classification when safe mode is target-side; player-facing mapping is NotVisibleOrNotFound."
    - code: TargetOverloadCooldown
      layer: validation
      index: 17
      description: "Target has an active overload cooldown"
      visibility_note: "Internal/admin trace only for target-side cooldown; player-facing mapping is NotVisibleOrNotFound with no remaining ticks."
    - code: TargetFortifyCooldown
      layer: validation
      index: 18
      description: "Target has an active fortify cooldown"
      visibility_note: "Internal/admin trace only for target-side cooldown; player-facing mapping is NotVisibleOrNotFound with no remaining ticks."
    - code: NotEnoughBodyParts
      layer: validation
      index: 19
      description: "Not enough body parts for operation"
    - code: InvalidBodyPart
      layer: validation
      index: 20
      description: "Invalid body part specified"
    - code: InvalidStructureType
      layer: validation
      index: 21
      description: "Invalid structure type specified"
    - code: InvalidResourceType
      layer: validation
      index: 22
      description: "Invalid resource type specified"
    - code: SourceNotAllowed
      layer: validation
      index: 23
      description: "Command source is not permitted for this operation"
    - code: UnknownAction
      layer: validation
      index: 24
      description: "Unknown action type"
    - code: GlobalStorageDisabled
      layer: validation
      index: 25
      description: "Global storage is not enabled"
    - code: TransferInProgress
      layer: validation
      index: 26
      description: "A transfer is already in progress"

    # --- 2.3 MCP-level ---
    - code: RateLimited
      layer: mcp
      index: 27
      description: "Rate limit exceeded"
    - code: InvalidCertificate
      layer: mcp
      index: 28
      description: "Certificate is invalid"
    - code: NotAuthorized
      layer: mcp
      index: 29
      description: "Not authorized for this operation"
      note: "Only for MCP-layer auth failures; validation layer uses NotOwner"

    # --- 2.4 Runtime-level ---
    - code: FuelExhausted
      layer: runtime
      index: 30
      description: "WASM fuel exhausted"
    - code: TimeoutExceeded
      layer: runtime
      index: 31
      description: "WASM execution timed out"
    - code: SnapshotOverBudget
      layer: runtime
      index: 32
      description: "Snapshot exceeds size budget"
    - code: CommandBufferFull
      layer: runtime
      index: 33
      description: "Command buffer is full"
    - code: ServerOverloaded
      layer: runtime
      index: 34
      description: "Server is overloaded; degraded mode"
    - code: InternalError
      layer: runtime
      index: 35
      description: "Engine internal error"

  naming_conventions:
    InsufficientResource: "Unified singular form; deprecated: InsufficientResources, InsufficientEnergy"
    ObjectNotFound: "Unified form; deprecated: TargetNotFound"
    CooldownActive: "Generic cooldown; SpawnOnCooldown is Spawn-specific"
    NotVisibleOrNotFound: "Safe merged code to prevent oracle inference"
    NotAuthorized: "MCP-layer only; validation layer uses NotOwner"

# =============================================================================
# 3. MCP Tools — active tool registry with security columns
# =============================================================================
mcp_tools:
  description: >
    Game MCP tools available to clients. Auth endpoints and SDK fetch are outside
    MCP: Auth uses auth_api REST endpoints, and SDK retrieval uses signed REST
    GET /sdk/:lang.
  total_tools: 47
  rate_limits:
    query: "50/tick"
    debug: "30/tick"
    dev_aux: "20/tick"
    deploy: "10/h"
    admin: "10/h"

  tools:
    # =========================================================================
    # Onboarding (10 tools)
    # =========================================================================
    - name: swarm_get_info
      category: Onboarding
      input_schema: {}
      output_schema:
        version: string
        tick_rate: u32
        world_name: string
        player_count: u32
      rate_limit: "100/min"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: per_player

    - name: swarm_get_snapshot
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        tick: u64
        player_id: PlayerId
        actor_context: "{active_drones: [DroneId], primary_drone: DroneId | null}"
        entities: "[Entity]"
        terrain: TerrainGrid
        resources: "[Resource]"
        events: "[VisibleEvent]"
        truncated: bool
        over_budget: "bool (optional; present and true only on deterministic minimal snapshot path)"
        messages: "[PlayerMessage]"
        omitted_categories: OmittedCategories
        omitted_messages: OmittedCategoryBucket
      rate_limit: "1/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_player

    - name: swarm_get_world_statistics
      category: Play
      input_schema: {}
      output_schema:
        tick: u64
        world_id: WorldId
        room_count: u32
        drone_count: u32
        controller_level_histogram: "Map<u32,u32>"
        public_arena_results: "[PublicArenaResult]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: public_aggregate_no_hidden_resources_or_entities
      rate_limit_key: global
      notes: "World mode publishes non-competitive aggregate statistics only; no hidden resource totals, entities, strategies, or private room results."

    - name: swarm_get_resources
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        resources: "[Resource]"
        storage: StorageInfo
        income_rate: ResourceRate_i64
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_list_rooms
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        rooms: "[{id, level, controller_level}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_player

    - name: swarm_get_room
      category: Onboarding
      input_schema:
        room_id: RoomId
      output_schema:
        terrain: TerrainGrid
        entities: "[Entity]"
        resources: "[Resource]"
        controller: ControllerInfo
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_room

    - name: swarm_list_drones
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        drones: "[{id, room, body, lifespan, status}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_get_drone
      category: Onboarding
      input_schema:
        drone_id: DroneId
      output_schema:
        id: DroneId
        room: RoomId
        body: "[BodyPart]"
        lifespan: u32
        status: DroneStatus
        code_hash: "string (owner-only; omitted for visible non-owner)"
        fuel_used: "u64 (owner-only; omitted for visible non-owner)"
        overload_pressure: "OverloadPressure (optional; omitted when caller has no pressure-relevant visible information)"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: drone_id
      replay_class: read_replay_safe
      visibility_filter: owner_or_visible_with_owner_fields
      field_visibility: "code_hash and fuel_used are owner-only and omitted for visible non-owner. overload_pressure is optional and visibility-filtered: target owner always sees total; contributing attacker sees total; contributions include caller-owned plus visible sources; third parties get visible-source contributions only and no total; omit only when caller is neither owner/contributor and sees no contribution."
      rate_limit_key: per_drone

    - name: swarm_get_code
      category: Onboarding
      input_schema:
        drone_id: DroneId
      output_schema:
        code: bytes
        hash: string
        language: string
        size: u32
        last_deployed: u64
      rate_limit: "20/tick"
      required_scope: "swarm:read"
      subject_source: drone_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_drone

    - name: swarm_get_docs
      category: Onboarding
      input_schema:
        topic: string?
      output_schema:
        docs: string
        sections: "[string]"
      rate_limit: "20/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global

    - name: swarm_get_schema
      category: Onboarding
      input_schema:
        entity_type: string?
      output_schema:
        schema: string
        version: string
      rate_limit: "20/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global

    # =========================================================================
    # Play (16 tools)
    # =========================================================================
    - name: swarm_get_replay
      category: Play
      input_schema:
        tick_range: TickRange
        room_id: "RoomId | null"
      output_schema:
        ticks: "[TickData]"
        entities: "[Entity]"
        commands: "[Command]"
        events: "[Event]"
      rate_limit: "5/min"
      required_scope: "swarm:read"
      subject_source: certificate_player_id
      replay_class: read_replay_safe
      visibility_filter: replay_privacy_and_participant
      rate_limit_key: per_player

    - name: swarm_get_events
      category: Play
      input_schema:
        room_id: RoomId
        tick_range: TickRange
      output_schema:
        events: "[{tick, type, data}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_room

    - name: swarm_get_terrain
      category: Play
      input_schema:
        room_id: RoomId
        bounds: Bounds
      output_schema:
        terrain_grid: TerrainGrid
        size: Size
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_room

    - name: swarm_get_path
      category: Play
      input_schema:
        from: Position
        to: Position
        player_id: PlayerId
      output_schema:
        path: "[Position]"
        distance: i64  # milli_distance units (1e-3 cells)
        cost: u64  # micro_cost units (1e-6 resource units)
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_player

    - name: swarm_get_visibility
      category: Play
      input_schema:
        player_id: PlayerId
      output_schema:
        visible_rooms: "[RoomId]"
        visible_entities: "[EntityId]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_list_controllers
      category: Play
      input_schema:
        player_id: PlayerId
      output_schema:
        controllers: "[{room, level, owner, progress?: owner-only}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: fog_of_war_and_owner_fields
      field_visibility: "progress is owner-only; room, level and owner follow fog_of_war"
      rate_limit_key: per_player

    - name: swarm_get_controller
      category: Play
      input_schema:
        controller_id: ControllerId
      output_schema:
        room: RoomId
        level: u32
        progress: "ProgressBps_i64 (owner-only; omitted for non-owner queries)"
        owner: PlayerId
        downgrade_timer: "u32 (owner-only; omitted for non-owner queries)"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: fog_of_war_and_owner_fields
      field_visibility: "progress and downgrade_timer are owner-only; room, level and owner follow fog_of_war"
      rate_limit_key: per_room

    - name: swarm_list_structures
      category: Play
      input_schema:
        room_id: RoomId
        player_id: PlayerId
      output_schema:
        structures: "[{id, type, pos, hits}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_room

    - name: swarm_get_structure
      category: Play
      input_schema:
        structure_id: StructureId
      output_schema:
        id: StructureId
        type: StructureType
        pos: Position
        hits: u32
        capacity: u32
        cooldown: "u32 (owner-only; omitted for non-owner queries)"
        overload_pressure: "OverloadPressure (optional; omitted when caller has no pressure-relevant visible information)"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: fog_of_war_and_owner_fields
      field_visibility: "cooldown is owner-only; id, type, pos, hits and capacity follow fog_of_war; overload_pressure is optional and visibility-filtered with the same OverloadPressure rules as swarm_get_drone."
      rate_limit_key: per_structure

    - name: swarm_get_messages
      category: Play
      input_schema:
        drone_id: DroneId
      output_schema:
        messages: "[{from, content, tick}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: drone_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_drone

    - name: swarm_get_economy
      category: Play
      input_schema:
        player_id: PlayerId
      output_schema:
        income: ResourceRate_i64
        expenses: ResourceRate_i64
        storage_tax: BasisPoints  # u32, 0-10000 = 0%-100%
        maintenance: ResourceRate_i64
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_get_economy_trend
      category: Play
      input_schema:
        player_id: PlayerId
        ticks: u32
      output_schema:
        trend: "[{tick, metric, value}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_get_drone_efficiency
      category: Play
      input_schema:
        drone_id: DroneId
      output_schema:
        drone_id: DroneId
        owner: PlayerId
        efficiency: EfficiencyBps
        factors: "{string: i64}"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: drone_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_drone

    - name: swarm_profile
      category: Play
      input_schema:
        player_id: PlayerId?
      output_schema:
        player_id: PlayerId
        gcl: u32
        rooms: u32
        drones: u32
        joined_at: u64
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_get_available_actions
      category: Play
      input_schema:
        drone_id: DroneId
      output_schema:
        actions: "[{action, cost, cooldown, description}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: drone_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_drone

    # =========================================================================
    # Deploy (7 tools)
    # =========================================================================
    - name: swarm_deploy
      category: Deploy
      input_schema:
        wasm_bytes: bytes
        mod_toml: string
        deploy_payload: DeployPayload
        code_signature: Ed25519Signature
        certificate_id: string
      output_schema:
        deploy_id: DeployId
        accepted: bool
        status: "enum { accepted, already_deployed }"
        validation_errors: "[string]"
        redb_version_counter: "u64; already_deployed returns the original committed value without increment"
      rate_limit: "10/h"
      required_scope: "swarm:deploy"
      subject_source: certificate_player_id
      replay_class: deploy_mutation
      visibility_filter: owner
      rate_limit_key: per_player
      notes: >
        wasm_bytes and mod_toml are submitted synchronously. Their hashes must match the signed DeployPayload; only the validated payload/hash metadata and compiled artifact identity enter the redb manifest.

    - name: swarm_validate_module
      category: Deploy
      input_schema:
        module_bytes: bytes
      output_schema:
        valid: bool
        errors: "[string]"
        fuel_estimate: u64
      rate_limit: "10/h"
      required_scope: "swarm:deploy"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: per_player

    - name: swarm_get_deploy_status
      category: Deploy
      input_schema:
        deploy_id: DeployId
      output_schema:
        status: DeployStatus
        errors: "[string]"
        deployed_at: u64
        redb_version_counter: u64
      rate_limit: "20/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_list_deployments
      category: Deploy
      input_schema:
        player_id: PlayerId
      output_schema:
        deployments: "[{id, drone_id, status, at, redb_version_counter}]"
      rate_limit: "20/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_get_world_config
      category: Deploy
      input_schema: {}
      output_schema:
        rules: "[WorldRulePlugin]"
        mods: "[ModInfo]"
        limits: Limits
        combat: CombatConfig
        special_attacks: SpecialAttacksConfig
        tick_rate: u32
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global

    - name: swarm_get_world_rules
      category: Deploy
      input_schema: {}
      output_schema:
        rule_plugins: "[WorldRulePlugin]"
        parameters: Parameters
        version: string
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global

    - name: swarm_list_modules
      category: Deploy
      input_schema:
        player_id: PlayerId
      output_schema:
        modules: "[{id, drone_id, hash, language, size, deployed_at, status}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    # =========================================================================
    # Debug (8 tools)
    # =========================================================================
    - name: swarm_get_tick_trace
      category: Debug
      input_schema:
        tick: u64
      output_schema:
        commands: "[Command]"
        state_diff: StateDiff
        rejections: "[Rejection]"
        metrics: Metrics
      rate_limit: "30/tick"
      required_scope: "swarm:debug"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: admin_scope
      rate_limit_key: global

    - name: swarm_get_engine_stats
      category: Debug
      input_schema: {}
      output_schema:
        tick_duration: u64
        player_count: u32
        memory: MemoryStats
        cpu: CpuStats
        sandbox_stats: SandboxStats
      rate_limit: "30/tick"
      required_scope: "swarm:debug"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: admin_scope
      rate_limit_key: global

    - name: swarm_get_sandbox_profile
      category: Debug
      input_schema:
        drone_id: DroneId
      output_schema:
        fuel_used: u64
        host_calls: u32
        memory_peak: u64
        execution_time: u64
      rate_limit: "30/tick"
      required_scope: "swarm:debug"
      subject_source: drone_id
      replay_class: read_replay_safe
      visibility_filter: admin_scope
      rate_limit_key: per_drone

    - name: swarm_list_errors
      category: Debug
      input_schema:
        player_id: PlayerId
        limit: u32
      output_schema:
        errors: "[{tick, drone, code, detail}]"
      rate_limit: "20/tick"
      required_scope: "swarm:debug"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: admin_scope
      rate_limit_key: per_player

    - name: swarm_get_state_checksum
      category: Debug
      input_schema:
        tick: u64
      output_schema:
        checksum: string
        algorithm: string
        scope: string
      rate_limit: "30/tick"
      required_scope: "swarm:debug"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: admin_scope
      rate_limit_key: global

    - name: swarm_simulate
      category: Debug
      input_schema:
        commands: "[Command]"
        assumptions: Assumptions
      output_schema:
        trace: TickTrace
        authoritative: false
        assumptions: Assumptions
        confidence: ConfidenceBps  # u32, 0-10000
      rate_limit: "50/tick"
      required_scope: "swarm:debug"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_dry_run
      category: Debug
      input_schema:
        module_bytes: bytes
        tick_count: u32
      output_schema:
        result: "Ok | RejectionReason"
        rejection_reason: "RejectionReason | null"
      rate_limit: "50/tick"
      required_scope: "swarm:debug"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner_safe
      rate_limit_key: per_player

    - name: swarm_explain_last_tick
      category: Debug
      input_schema:
        drone_id: DroneId
      output_schema:
        explanation: string
        commands_executed: u32
        commands_rejected: u32
        events: "[string]"
      rate_limit: "10/tick"
      required_scope: "swarm:debug"
      subject_source: drone_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_drone

    # =========================================================================
    # Arena (4 tools)
    # =========================================================================
    - name: swarm_tournament_create
      category: Arena
      input_schema:
        tournament_id: string
        elimination: TournamentElimination
        fixed_ticks: Tick
        players: "[PlayerId]"
      output_schema:
        tournament_id: string
        status: string
        elimination: TournamentElimination
        fixed_ticks: Tick
        players: "[PlayerId]"
        scheduled: "[TournamentMatchSchedule]"
      rate_limit: "20/tick"
      required_scope: "swarm:admin"
      subject_source: admin_id
      replay_class: admin_critical
      visibility_filter: admin_scope
      rate_limit_key: per_admin
      notes: "Creates an Engine-managed tournament with admin authorization and deterministic rules."

    - name: swarm_tournament_precommit
      category: Arena
      input_schema:
        tournament_id: TournamentId
        match_id: TournamentMatchId
        slot_id: TournamentSlotId
        module_id: string
        expected_module_hash: Blake3Hash
      output_schema:
        status: string
        locked_module: TournamentLockedModule
      rate_limit: "5/tick"
      required_scope: "swarm:deploy"
      subject_source: player_id
      replay_class: idempotent_mutation
      visibility_filter: owner
      rate_limit_key: per_player
      notes: "Fail closed unless certificate player is assigned to this exact tournament/match/slot, owns module_id/hash, precommit is open, and the slot has no conflicting lock. Idempotent only for the identical binding."

    - name: swarm_tournament_status
      category: Arena
      input_schema: {}
      output_schema:
        tick: u64
        player_id: PlayerId
        mode: string
        deploy_locked: bool
        locked_module: "TournamentLockedModule? (owner-only)"
        preparation_tools: "[ToolInfo]"
        direct_gameplay_tools_enabled: bool
        tournaments: "[TournamentBracketStatus] filtered by room visibility and participant membership"
      rate_limit: "50/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: arena_room_visibility_and_owner_fields
      rate_limit_key: per_player
      notes: "Returns the current tournament phase, player count, tick, and bracket state."

    - name: swarm_match_result
      category: Arena
      input_schema:
        tournament_id: string
        match_id: u64
        winner: PlayerId
      output_schema:
        tournament_id: string
        match_id: u64
        winner: PlayerId
        loser: PlayerId
        champion: PlayerId?
        scheduled: "[TournamentMatchSchedule]"
      rate_limit: "20/tick"
      required_scope: "swarm:admin"
      subject_source: admin_id
      replay_class: admin_critical
      visibility_filter: admin_scope
      rate_limit_key: per_admin

    # =========================================================================
    # Resources (2 tools)
    # =========================================================================
    - name: resources/list
      category: Resources
      input_schema: {}
      output_schema:
        resources: "[{type, name, category}]"
      rate_limit: "50/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global

    - name: resources/read
      category: Resources
      input_schema:
        resource_type: ResourceName
      output_schema:
        type: ResourceName
        name: string
        category: string
        base_value: u64
        rarity: string
      rate_limit: "50/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global

  capability_profiles:
    onboarding:
      tools: [swarm_get_info, swarm_get_docs, swarm_get_schema, resources/list, resources/read]
      external_routes: ["GET /sdk/:lang"]
      default_assignment: "all authenticated clients"
    play:
      categories: [Play]
      default_assignment: "World players, Arena spectators"
    deploy:
      categories: [Deploy]
      default_assignment: "all authenticated clients"
    debug:
      categories: [Debug]
      default_assignment: "developers / Arena hosts"
    arena:
      categories: [Arena]
      default_assignment: "Arena host / tournament admin"

  websocket_security:
    agent_ws:
      model: "TLS transport + authenticated request session + per-role ACL"
      description: "Agent writes use the MCP/HTTP authentication path. WebSocket transport carries tick streams and rejects unauthorized subscriptions through Gateway ACL."
    browser_ws:
      model: "read-only"
      description: "Browser WebSocket receives broadcasts only (tick deltas, event streams). Write operations go through MCP/HTTP path."
    replay_ws:
      model: "read-only + seek"
      description: "Replay clients can request historical tick ranges but cannot inject new commands."
    agent_ws_ticket:
      model: "Gateway certificate-signed WebSocket ticket"
      covers: [room, session_id, cert_id, expires, transport]
      transport: ws
      violation: "invalid signature, expired ticket, audience mismatch, or non-ws transport -> disconnect + audit log"

# =============================================================================
# 3.1 REST SDK Route — outside MCP
# =============================================================================
rest_sdk:
  canonical_route: "GET /sdk/:lang"
  description: >
    Signed REST route for SDK retrieval. :lang is a SDK language identifier such
    as typescript or rust. This route uses application-layer certificate request
    signing, rate limit, and audience checks. It is not an MCP tool.
  input_schema:
    lang: string
  output_schema:
    sdk_code: string
    type_definitions: string
    examples: string
    abi_version: string
    min_engine_version: string
  errors:
    unsupported_language: SchemaViolation
    rate_limited: RateLimited
  rate_limit: "5/min"

# =============================================================================
# 3.2 WASM ABI v2 — Swarm codec tick and host wire
# =============================================================================
wasm_abi_v2:
  version: 2
  breaking_policy: "immediate"
  codec: "IDL-generated, versioned, little-endian, length-prefixed Swarm codec"
  json_scope: "Debug display only; not ABI v2 tick or host wire format."
  tick_export:
    signature: "tick(input_ptr: i32, input_len: i32, output_ptr: i32, output_len: i32) -> i32"
    input: TickInput
    output: TickResult
    return_value: "bytes_written when non-negative; negative values are ABI failures before a complete TickResult is written"
  tick_input:
    required_fields:
      - tick
      - player_id
      - world_id
      - visible_snapshot
      - world_config_view
      - fuel_budget_hints
      - message_inbox_cursor
  tick_result:
    required_fields: [commands]
    optional_fields: [messages]
    semantics:
      commands: "CommandIntent[]; untrusted intents decoded and validated by the engine before world mutation"
      messages: "Owner-only player/debug messages delivered to the private player message queue; never applied as world mutation and never included in public replay or spectator output"
  command_intent:
    required_fields: [sequence, action]
    server_injected_fields: [player_id, source, tick]
  host_result:
    description: "Guest-buffer tagged result header followed by Swarm codec payload."
    header:
      tag: u16
      code: i32
      payload_len: u32
      payload: "[u8; payload_len]"
    return_value: "Non-negative host return is bytes_written; negative return is ABI-level failure."
    domain_errors: "Encoded in HostResult header/payload, not as negative ABI returns."
  host_error:
    independence: "HostError is separate from REST/MCP RejectionReason and separate from negative ABI failures."
    hidden_or_absent_queries: "Successful empty result; do not reveal whether the target is hidden or absent."

# =============================================================================
# 4. Host Functions — ABI signatures, budgets, fuel costs, error priority
# =============================================================================
host_functions:
  description: "WASM modules import these host functions to call engine services."
  total_functions: 7
  functions:
    - name: host_get_terrain
      index: 1
      abi_signature: "(room_id: u32, out_ptr: i32, out_len: i32) -> i32"
      read_only: true
      description: "Get room terrain data"
      max_output: "8 KB"
      per_call_fuel:
        base: 500
        incremental: null
      per_call_budget: null  # counted against total
      per_tick_budget: null

    - name: host_get_objects_in_range
      index: 2
      abi_signature: "(x: i32, y: i32, range: u32, out_ptr: i32, out_len: i32) -> i32"
      read_only: true
      description: "Get entities within range of (x,y)"
      max_output: "64 KB"
      per_call_fuel:
        base: 2000
        incremental: "+100/entity"
      per_call_budget: null
      per_tick_budget: 5  # max calls per tick

    - name: host_path_find
      index: 3
      abi_signature: "(from_x: i32, from_y: i32, to_x: i32, to_y: i32, opts_ptr: i32, opts_len: i32, out_ptr: i32, out_len: i32) -> i32"
      read_only: true
      description: "A* pathfinding"
      max_output: "8 KB"
      per_call_fuel:
        base: "500 × nodes"
        incremental: "+200 × edges"
      per_call_budget: null
      per_tick_budget: 10  # max calls per tick

    - name: host_get_world_config
      index: 4
      abi_signature: "(key_ptr: i32, key_len: i32, out_ptr: i32, out_len: i32) -> i32"
      read_only: true
      description: "Read world configuration value"
      max_output: "16 KB"
      per_call_fuel:
        base: 1000
        incremental: null
      per_call_budget: null
      per_tick_budget: 5

    - name: host_get_world_rules
      index: 5
      abi_signature: "(rule_id_ptr: i32, rule_id_len: i32, out_ptr: i32, out_len: i32) -> i32"
      read_only: true
      description: "Read rule module data"
      max_output: "16 KB"
      per_call_fuel:
        base: 1000
        incremental: null
      per_call_budget: null
      per_tick_budget: 1

    - name: host_get_random
      index: 6
      abi_signature: "(sequence: u64, out_ptr: i32, out_len: i32) -> i32"
      read_only: true
      description: "Deterministic random bytes from engine PRNG"
      seed: "derive_rng(domain, world_seed, tick, actor_or_entity_id, sequence)"
      max_output: "256 bytes"
      per_call_fuel:
        base: 200
        incremental: "+10/32 bytes"
      per_call_budget: null
      per_tick_budget: 10

    - name: host_get_fuel_remaining
      index: 7
      abi_signature: "() -> u64"
      read_only: true
      description: "Remaining WASM fuel budget for the current tick"
      max_output: "8 bytes"
      per_call_fuel:
        base: 20
        incremental: null
      per_call_budget: null
      per_tick_budget: null

  total_host_call_budget: "1,000/tick/player"
  host_call_output_limits:
    host_path_find: "8 KB"
    host_get_objects_in_range: "64 KB"
    host_get_world_config: "16 KB"
    host_get_world_rules: "16 KB"
    host_get_terrain: "8 KB"
    host_get_random: "256 bytes"
    host_get_fuel_remaining: "8 bytes"

  # ABI error priority table — per api-registry.md §4.5
  # When multiple error conditions are met simultaneously, the first matching
  # priority wins. Exhaustive ordering ensures deterministic error reporting.
  abi_error_priority:
    - { priority: 1, code: -1, name: ERR_MEMORY_BOUNDS, condition: "out_ptr/out_len out of bounds" }
    - { priority: 2, code: -2, name: ERR_ABI_VERSION, condition: "ABI version / schema mismatch" }
    - { priority: 3, code: -3, name: ERR_NOT_VISIBLE, condition: "Entity not visible (visibility redaction)" }
    - { priority: 4, code: -4, name: ERR_BUDGET_EXHAUSTED, condition: "Per-call budget exhausted" }
    - { priority: 5, code: -5, name: ERR_PLAYER_BUDGET, condition: "Per-player budget exhausted" }
    - { priority: 6, code: -6, name: ERR_GLOBAL_BUDGET, condition: "Global budget exhausted" }
    - { priority: 7, code: -7, name: ERR_VALIDATION, condition: "Function-specific validation failure" }
    - { priority: 8, code: -8, name: ERR_OUTPUT_SIZE, condition: "Output size exceeded" }
    - { priority: 9, code: -9, name: ERR_TIMEOUT, condition: "Timeout (online execution only; replay does not re-run COLLECT)" }

# =============================================================================
# 5. Limits — all capacity constants
# =============================================================================
limits:
  description: "Authoritative global capacity limits. All other docs reference these values."

  game_limits:
    commands_per_player_per_tick: 100
    per_player_drone_cap: 500
    per_player_drone_cap_note: "adjustable via world.toml"
    global_drone_cap: 10000
    global_entity_cap: 50000
    drone_lifespan: 1500
    drone_lifespan_unit: "ticks"
    max_body_parts: 50
    max_construction_sites: 100
    safe_mode_duration: 500
    safe_mode_duration_unit: "ticks"
    reservation_timeout: 1000
    reservation_timeout_unit: "ticks"
    downgrade_timer: 5000
    downgrade_timer_unit: "ticks"
    global_storage_capacity: 1000000
    global_storage_capacity_unit: "units"
    global_storage_capacity_note: "adjustable via world.toml"

  wasm_limits:
    wasm_memory_max: "128 MB"
    wasm_memory_max_note: "cgroup process-level; WASM linear memory 64 MB"
    sandbox_cpu: "cpu.max = 250000 3000000"
    sandbox_cpu_note: "0.25s per 3s period"
    per_player_sandbox_deadline: "2500ms"
    per_player_sandbox_deadline_mode: "World"
    mcp_simulate_max_ticks: 100
    mcp_simulate_max_entities: 1000
    pathfinding_budget: 100000
    pathfinding_budget_unit: "explored nodes/tick (engine global)"
    pathfinding_result_path_max: 500
    pathfinding_result_path_max_unit: "nodes"

  trace_retention:
    replay_critical_redb: permanent
    rich_artifact_retention_ticks: 864000
    keyframe_acceleration_retention_ticks: 5184000
    unit: ticks

  replay:
    keyframe_interval: 100
    keyframe_interval_unit: "ticks"
    code_update_cooldown: 5
    code_update_cooldown_unit: "ticks"
    code_update_cooldown_note: "World minimum; configurable via world.toml"

  hardware_baseline:
    target_active_players: 400
    target_hardware: "64 GB RAM, 32 cores"
    hard_cap_players: 500
    hard_cap_behavior: "reaching the cap rejects new active-player admission"
    worker_pool_size: "min(max_pool, active_players)"
    worker_pool_max: 256  # runtime default
    worker_pool_hard_cap: 1000  # compile-time hard cap
    degraded_mode: "refuse new active-player admission at hard cap; already-ticking players continue"

  fair_share_admission:
    pathfinding:
      global_budget: 100000
      unit: "explored nodes/tick"
      allocation: "floor(100000 / active_players)"
      exhaustion: "first-come-first-served; ERR_BUDGET_EXHAUSTED when quota exceeded"
      recompute: "at tick start, fixed for entire tick"
    host_calls:
      global_budget: 1000
      unit: "calls/tick/player"
      allocation: "fixed per-player cap"
    snapshot:
      global_budget: "256 KB"
      allocation: "fixed per-player cap"

# =============================================================================
# 6. TickTrace Envelope — 22 fields including terminal_state
# =============================================================================
tick_trace_envelope:
  description: >
    TickInputEnvelope fields for replay determinism. All fields are authoritative.
    terminal_state replaces the legacy wasm_status enum with explicit variants.
  total_fields: 22
  fields:
    - { name: api_version, type: u32, description: "API registry version" }
    - { name: module_hash, type: "[u8; 32]", description: "WASM module Blake3 hash" }
    - { name: wasmtime_version, type: string, description: "Wasmtime engine version" }
    - { name: effective_tick, type: u64, description: "Effective tick number" }
    - { name: terminal_state, type: enum, description: "Terminal execution state (see terminal_state enum below)" }
    - { name: snapshot_hash, type: "[u8; 32]", description: "Input snapshot hash" }
    - { name: commands_hash, type: "[u8; 32]", description: "Output commands hash" }
    - { name: deploy_events, type: "[DeployEvent]", description: "Deploy event list" }
    - { name: rollback_events, type: "[RollbackEvent]", description: "Rollback event list" }
    - { name: admin_events, type: "[AdminEvent]", description: "Admin event list" }
    - { name: world_config_hash, type: "[u8; 32]", description: "World configuration hash" }
    - { name: mods_lock_hash, type: "[u8; 32]", description: "Rule module lock hash" }
    - { name: engine_abi_version, type: u32, description: "Engine ABI version" }
    - { name: core_idl_version, type: u32, description: "Core IDL version" }
    - { name: world_action_manifest_hash, type: "[u8; 32]", description: "World Action Manifest hash" }
    - { name: validator_version, type: u32, description: "Validator version" }
    - { name: rejection_reason_registry_version, type: u32, description: "RejectionReason registry version" }
    - { name: system_manifest_hash, type: "[u8; 32]", description: "Fixed 31-entry execution manifest hash (S01-S29; excludes A01)" }
    - { name: limits_manifest_hash, type: "[u8; 32]", description: "Limits Manifest hash" }
    - { name: host_abi_version, type: u32, description: "Host Function ABI version" }
    - { name: canonical_codec_version, type: u32, description: "Canonical Codec version" }
    - { name: visibility_truncation_version, type: u32, description: "Visibility/Truncation algorithm version" }

  terminal_state:
    description: >
      Replaces the legacy wasm_status field. Explicit terminal states for WASM
      execution outcomes. Used for replay determinism — replay MUST produce the
      identical terminal_state or the replay is invalid.
    enum:
      - name: Success
        value: 0
        description: "WASM execution completed successfully, commands produced"
      - name: FuelExhausted
        value: 1
        description: "WASM fuel budget exhausted before completion"
      - name: TimeoutExceeded
        value: 2
        description: "WASM execution exceeded wall-clock deadline"
      - name: SnapshotOverBudget
        value: 3
        description: "Input snapshot exceeded per-player size budget"
      - name: CommandBufferFull
        value: 4
        description: "Output command buffer exceeded capacity"
      - name: InternalError
        value: 5
        description: "Engine internal error during WASM execution"
      - name: NotExecuted
        value: 6
        description: "WASM was not executed this tick (e.g., replay from snapshot, degraded mode skip)"

# =============================================================================
# 7. Direction — enum
# =============================================================================
direction:
  description: "4-direction cardinal-grid enum used by Move command. Names match Engine `Direction` serialization."
  type: enum
  values:
    - { name: North, value: 0 }
    - { name: South, value: 1 }
    - { name: East, value: 2 }
    - { name: West, value: 3 }

# =============================================================================
# 8. SwarmError JSON-RPC Envelope
# =============================================================================
swarm_error_envelope:
  description: "Unified MCP/API error format. Swarm application errors use JSON-RPC numeric error.code -32000; the canonical wire enum is carried in error.data.rejection_reason."
  format: jsonrpc_2.0
  schema:
    jsonrpc: "2.0"
    error:
      code: "-32000 (integer, Swarm application error)"
      message: "Human-readable detail (max 256 chars)"
      data:
        rejection_reason: "RejectionReason (canonical enum string)"
        command_index: "u32 (optional)"
        debug_detail: "max 512 bytes — non-canonical contextual detail (see rejection_reason.debug_detail)"
        retry_allowed: "bool (optional)"
        idempotency_key: "string | null (optional)"
        retry_after_tick: "u64 | null (optional)"
    id: "<request_id>"
  reserved_code:
    code: -32000
    usage: "all Swarm application errors; JSON parse/schema/transport failures use standard JSON-RPC numeric codes"

# =============================================================================
# 9. ResourceOperation — all operation types
# =============================================================================
resource_operation:
  description: "Resource-affecting operations across CommandAction and ActionRegistry."
  operations:
    - name: Harvest
      action_index: 2
      category: core
      description: "Harvest a resource from target entity"
      resource_flow: "source → drone"
    - name: Transfer
      action_index: 3
      category: core
      description: "Transfer resources locally to target"
      resource_flow: "drone → target"
    - name: Withdraw
      action_index: 4
      category: core
      description: "Withdraw resources from structure"
      resource_flow: "structure → drone"
    - name: TransferToGlobal
      action_index: 12
      category: global_storage
      description: "Deposit resources to global storage"
      resource_flow: "drone → global"
    - name: TransferFromGlobal
      action_index: 13
      category: global_storage
      description: "Withdraw resources from global storage"
      resource_flow: "global → drone"
    - name: AlliedTransfer
      action_index: 14
      category: global_storage
      description: "Delayed transfer to an allied player"
      resource_flow: "sender global → receiver global"
    - name: Drain
      action_index: 18
      category: action_registry
      description: "Continuously drain resources from target"
      resource_flow: "target → drone"

# =============================================================================
# 10. Deploy — deploy_mutation + redb_version_counter
# =============================================================================
DeployPayload:
  type: object
  additional_properties: false
  required: [domain, wasm_hash, metadata_hash, player_id, world_id, module_slot, version_counter, transport, signed_at]
  fields:
    domain: "const SWARM-DEPLOY-V1"
    wasm_hash: Blake3Hash
    metadata_hash: Blake3Hash
    player_id: PlayerId
    world_id: WorldId
    module_slot: string
    version_counter: u64
    transport: "enum { mcp, rest, ws, replay }"
    signed_at: u64
  domain: SWARM-DEPLOY-V1

deploy:
  description: >
    Deployments synchronously validate wasm_bytes, mod_toml, signed DeployPayload,
    code_signature and certificate_id. A small manifest containing the validated
    hashes, identity, slot, version counters and compiled artifact identity is
    committed to redb. Raw bytes are not duplicated in redb.
  mechanism: deploy_mutation
  redb_version_counter:
    description: >
      Monotonically increasing counter maintained in redb. Assigned atomically
      with the deploy manifest commit. Provides a strict total order across all
      deployments, which is critical for replay determinism — the replay engine
      replays deploy events in redb_version_counter order.
    type: u64
    atomicity: "incremented within the same redb transaction as the deploy manifest"
    replay_contract: "deploy events MUST be replayed in redb_version_counter ascending order"

  flow:
    step_1_authenticate:
      description: "Verify certificate usage, signature, DeployPayload domain/transport/audience, and request replay protections"
      actor: engine
    step_2_validate:
      description: "Client calls swarm_validate_module or submits wasm_bytes + mod_toml + signed DeployPayload in swarm_deploy"
      actor: client
    step_3_compile_attestation:
      description: "Engine sends raw WASM to Sandbox; Sandbox compiles and returns authenticated DeployAck with compiled_artifact_hash and pinned versions. Engine verifies HMAC attestation."
      actor: sandbox_and_engine
    step_4_commit_manifest:
      description: "redb transaction atomically commits manifest plus accounting: {deploy_id, player_id, world_id, module_slot, wasm_module_hash, metadata_hash, deploy_payload_hash, compiled_artifact_hash, certificate_id, version_counter, redb_version_counter, activation_tick, code_update_cost_debit, cooldown_previous_tick, cooldown_next_tick, refund_credit_reset_amount}"
      actor: engine
      note: "This is the only redb write — small, fast, deterministic"
    step_5_activate:
      description: "On next tick boundary, engine activates compiled artifact matching the manifest"
      actor: engine
      note: "Activation occurs at tick boundary for deterministic scheduling"

  swarm_deploy_output:
    deploy_id: DeployId
    accepted: bool
    status: "enum { accepted, already_deployed }"
    validation_errors: "[string]"
    redb_version_counter: "u64; already_deployed returns original value without increment"

# =============================================================================
# 11. Persistence — async_object_store_upload
# =============================================================================
persistence:
  description: >
    Persistence layer for large binary objects. Per D5/B, object-store blob
    uploads are asynchronous — they do not block the redb commit path. redb only
    stores a small manifest record with the blob hash pointer. This decouples
    I/O throughput from transaction latency.
  async_object_store_upload:
    description: >
      Asynchronous upload of non-deploy replay recordings and snapshot archives.
      Deploy WASM/compiled artifacts use the attested synchronous deploy flow.
      task pool; the caller receives an immediate acknowledgment with an
      archive_key that can be polled for completion status.
    storage_backend: "pluggable (default: local filesystem; production: S3-compatible)"
    blob_types:
      - type: replay_recording
        max_size: "1 GB"
        retention: "per rich_artifact_retention_ticks policy; non-authoritative"
        content_hash: Blake3
      - type: snapshot_archive
        max_size: "256 MB"
        retention: "per keyframe_acceleration_retention_ticks policy; genesis replay remains authoritative"
        content_hash: Blake3
    upload_contract:
      invocation: "fire-and-forget for non-deploy archives"
      acknowledgment: "immediate — returns archive_key"
      completion_polling: "operator/internal artifact status keyed by archive_key; not swarm_get_deploy_status"
      failure_mode: "retry with exponential backoff; permanent failure marks archive failed"
    redb_manifest:
      description: >
        redb stores non-authoritative artifact metadata: {blob_hash, archive_key,
        size, uploaded_at, status}. It is not deploy_mutation/replay-critical state
        and does not consume redb_version_counter.
      fields:
        - blob_hash: "[u8; 32]"
        - archive_key: string
        - size: u64
        - uploaded_at: u64
        - status: "enum { pending, complete, failed }"

# =============================================================================
