# =============================================================================
# Game API IDL — Machine-Readable Single Source of Truth
# =============================================================================
# Canonical source for codegen / SDK / CI. All other docs derive from this.
# This file is validated by CI — do not edit Markdown tables directly.
# =============================================================================

api_version: "0.4.0"

# =============================================================================
# Type Registry — fixed-point integer types replacing f64
# =============================================================================
# All f64 fields have been replaced with fixed-point integer representations
# to guarantee deterministic cross-platform behavior.
#
#   ResourceRate_i64  — i64, units of 1e-6 resources per tick  (micro_rate)
#   ProgressBps_i64   — i64, basis points (1 bp = 0.01%)         (bps)
#   BasisPoints       — u32, 0–10000 = 0%–100%                   (fixed-point %)
#   EfficiencyBps     — u32, 0–10000 = 0%–100%                   (fixed-point %)
#   ConfidenceBps     — u32, 0–10000                              (fixed-point %)
#   milli_distance     — i64, units of 1e-3 cells                 (distance)
#   micro_cost         — u64, units of 1e-6 resource units        (cost)
#
type_registry:
  fixed_point_types:
    ResourceRate_i64:
      base_type: i64
      scale: 1_000_000  # 1e6
      description: "Resource rate in micro-units per tick (1.0 = 1_000_000)"
    ProgressBps_i64:
      base_type: i64
      scale: 10_000   # basis points
      description: "Progress in basis points (100.00% = 10_000)"
    BasisPoints:
      base_type: u32
      range: "0..10000"
      description: "Percentage in basis points (50% = 5000)"
    EfficiencyBps:
      base_type: u32
      range: "0..10000"
      description: "Efficiency in basis points"
    ConfidenceBps:
      base_type: u32
      range: "0..10000"
      description: "Confidence in basis points"
    milli_distance:
      base_type: i64
      scale: 1_000  # 1e3
      description: "Distance in milli-cell units (1 cell = 1000)"
    micro_cost:
      base_type: u64
      scale: 1_000_000  # 1e6
      description: "Cost in micro resource units (1.0 = 1_000_000)"

  enum_types:
    ObjectiveType:
      description: "Machine-readable objective type for swarm_get_objectives. AI agents use this to plan."
      total_variants: 8
      variants:
        - { name: collect_resource, value: 0, description: "Gather resources; Vanilla resource set is Energy-only, multi-resource worlds are advanced/modded" }
        - { name: build_structure, value: 1, description: "Build a specific structure type" }
        - { name: claim_room,      value: 2, description: "Claim a room controller to target RCL" }
        - { name: spawn_drones,    value: 3, description: "Spawn N drones with specified body composition" }
        - { name: deploy_code,     value: 4, description: "Deploy/update WASM module" }
        - { name: survive_ticks,   value: 5, description: "Survive for N ticks with at least one drone" }
        - { name: defeat_enemy,    value: 6, description: "Destroy enemy units/structures (PvP/Arena)" }
        - { name: event,           value: 7, description: "Time-limited special world event objective" }

# =============================================================================
# 1. CommandAction — 11 variants (+ Action system)
# =============================================================================
# All 11 combat actions (Attack, RangedAttack, Heal, Hack, Drain,
# Overload, Debilitate, Disrupt, Fortify, Leech, Fabricate) moved to
# ActionRegistry. CommandAction retains only non-combat fundamental operations.
command_action:
  description: "Core CommandAction enum. WASM tick() output CommandIntent action types. Combat/effect actions dispatched via ActionRegistry."
  total_variants: 11
  variants:
    # --- 1.1 Core (8) ---
    - name: Move
      index: 1
      category: core
      parameters:
        - name: direction
          type: Direction4
          required: true
      description: "Move one cell in N/S/E/W direction"

    - name: Harvest
      index: 2
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Harvest a resource from target"

    - name: Transfer
      index: 3
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
        - name: resource
          type: ResourceType
          required: true
        - name: amount
          type: u32
          required: true
      description: "Transfer resources locally to target"

    - name: Withdraw
      index: 4
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
        - name: resource
          type: ResourceType
          required: true
        - name: amount
          type: u32
          required: true
      description: "Withdraw resources from structure"

    - name: Build
      index: 5
      category: core
      parameters:
        - name: structure_type
          type: StructureType
          required: true
        - name: x
          type: i32
          required: true
        - name: y
          type: i32
          required: true
      description: "Build a structure at (x,y)"

    - name: Spawn
      index: 9
      category: core
      parameters:
        - name: body_parts
          type: "[BodyPart]"
          required: true
        - name: spawn_id
          type: SpawnId
          required: true
      description: "Spawn a drone with given body parts"

    - name: Recycle
      index: 10
      category: core
      parameters:
        - name: object_id
          type: EntityId
          required: true
      description: "Recycle own drone (self-action — no spawn proximity required)"

    - name: ClaimController
      index: 11
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Claim a room controller"

    # --- 1.2 Global Storage (2) ---
    - name: TransferToGlobal
      index: 12
      category: global_storage
      parameters:
        - name: resource
          type: ResourceType
          required: true
        - name: amount
          type: u32
          required: true
      description: "Deposit resources to global storage"

    - name: TransferFromGlobal
      index: 13
      category: global_storage
      parameters:
        - name: resource
          type: ResourceType
          required: true
        - name: amount
          type: u32
          required: true
      description: "Withdraw resources from global storage"

    # --- 1.3 Action (1) — unified combat/effect dispatch ---
    - name: Action
      index: 22
      category: action
      parameters:
        - name: type
          type: string
          required: true
          description: "Action type key registered in ActionRegistry"
        - name: payload
          type: ActionPayload
          required: true
          description: "Type-specific action parameters"
      description: "Execute a registered action via ActionRegistry dispatch. Replaces all combat/special-attack CommandAction variants ."

  # =============================================================================
  # ActionRegistry — 11 vanilla + mod-extensible combat/effect actions
  # =============================================================================
  action_registry:
    description: "All combat and effect actions. 11 vanilla actions built-in (immutable). World mods register additional actions without touching CommandAction enum."
    total_vanilla: 11
    registration:
      description: "World mods register new actions via world.toml [[action_registry]] and Bevy Plugin ActionRegistry installers."
      authority: "World Action Manifest (world.toml [[action_registry]]) + Bevy Plugin registration"
      conflict_resolution: "Vanilla names are reserved and cannot be overridden by mods."

    vanilla_actions:
      description: "11 built-in combat/effect actions. Canonical parameters and effects in specs/reference/special-attack-table.md."
      actions:
        - type: Attack
          index: 14
          category: basic_combat
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Melee attack target"

        - type: RangedAttack
          index: 15
          category: basic_combat
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Ranged attack target"

        - type: Heal
          index: 16
          category: basic_combat
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Repair or heal target"

        - type: Hack
          index: 17
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "5-stage intrusion attack"

        - type: Drain
          index: 18
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Continuously drain resources from target"

        - type: Overload
          index: 19
          category: special_attack
          parameters:
            - name: target_id
              type: PlayerId
              required: true
          description: "Reduce target player fuel budget"

        - type: Debilitate
          index: 20
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Reduce target combat throughput"

        - type: Disrupt
          index: 21
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Interrupt target operation"

        - type: Fortify
          index: 22
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Strengthen own defenses"

        - type: Leech
          index: 23
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Life-drain attack — deal Kinetic damage and heal self for 50% of damage dealt"

        - type: Fabricate
          index: 24
          category: special_attack
          parameters:
            - name: target_id
              type: EntityId
              required: true
          description: "Convert enemy drone into friendly structure (Tower/Storage/Wall) — requires 5-tick channel"

# 2. RejectionReason — canonical wire enum + debug_detail
# =============================================================================
rejection_reason:
  description: >
    All command rejection reasons. Covers Pipeline, Validation, MCP, and Runtime layers.
    Canonical codes are the wire enum. Detailed contextual information
    (e.g. NotMovable, Fatigued, specific target state) goes into the `debug_detail` field,
    NOT into additional RejectionReason enum variants. This keeps the wire enum stable
    while providing rich debugging data.
  total_canonical_codes: generated
  debug_detail:
    description: >
      Non-canonical, human-readable detail string providing context beyond the
      canonical codes. Examples: "NotMovable: encumbered by 3 units", "Fatigued:
      action cooldown 12 ticks remaining", "PathBlocked: obstacle at (5,3)".
      This field is NOT part of the RejectionReason wire enum — it is a separate
      string payload that does not affect replay determinism.
    max_length: 512
    unit: "bytes"
  detail_level:
    description: >
      Controls the verbosity of debug_detail in rejection responses. Allows
      operators to tune information leakage vs debugging utility.
    enum:
      - value: competitive
        description: "Minimal detail — only canonical code, no debug_detail. Tournament/ladder mode."
      - value: practice
        description: "Moderate detail — debug_detail includes cooldown/timer values, bot-facing hints."
      - value: training
        description: "Full detail — debug_detail includes exact state diffs, path traces, internal diagnostics."
    default: competitive

  variants:
    # --- 2.1 Pipeline-level (pre-processing, not in enum proper) ---
    - code: InvalidJson
      layer: pipeline
      description: "JSON parsing failed"
    - code: SchemaViolation
      layer: pipeline
      description: "Command schema does not conform to IDL"

    # --- 2.2 Validation-level ---
    - code: ObjectNotFound
      layer: validation
      index: 1
      description: "Target entity does not exist"
    - code: NotOwner
      layer: validation
      index: 2
      description: "Not the owner of the target entity"
    - code: InsufficientResource
      layer: validation
      index: 3
      description: "Insufficient resources for operation"
      note: "Unified singular form; deprecated: InsufficientResources, InsufficientEnergy"
    - code: OutOfRange
      layer: validation
      index: 4
      description: "Target is beyond operation range"
    - code: NotStructure
      layer: validation
      index: 5
      description: "Target is not a structure"
    - code: NotController
      layer: validation
      index: 6
      description: "Target is not a controller"
    - code: NotVisibleOrNotFound
      layer: validation
      index: 7
      description: "Target not visible or does not exist (merged to prevent oracle inference)"
    - code: TargetNotVisible
      layer: validation
      index: 8
      description: "Target is not in field of view"
    - code: SpawnOnCooldown
      layer: validation
      index: 9
      description: "Spawn is on cooldown"
    - code: RoomDroneCapReached
      layer: validation
      index: 10
      description: "Room drone capacity reached"
    - code: AuthContextInvalid
      layer: validation
      index: 11
      description: "Authentication context is invalid"
    - code: CooldownActive
      layer: validation
      index: 12
      description: "Operation cooldown is active"
      note: "Generic cooldown; SpawnOnCooldown reserved for Spawn-specific"
    - code: InvalidDirection
      layer: validation
      index: 13
      description: "Direction is not one of the 4 valid directions"
    - code: PositionOccupied
      layer: validation
      index: 14
      description: "Target position is occupied"
    - code: ConstructionLimitReached
      layer: validation
      index: 15
      description: "Structure construction limit reached"
    - code: SafeModeActive
      layer: validation
      index: 16
      description: "Target is in safe mode"
    - code: TargetOverloadCooldown
      layer: validation
      index: 17
      description: "Target has an active overload cooldown"
    - code: TargetFortifyCooldown
      layer: validation
      index: 18
      description: "Target has an active fortify cooldown"
    - code: NotEnoughBodyParts
      layer: validation
      index: 19
      description: "Not enough body parts for operation"
    - code: InvalidBodyPart
      layer: validation
      index: 20
      description: "Invalid body part specified"
    - code: InvalidStructureType
      layer: validation
      index: 21
      description: "Invalid structure type specified"
    - code: InvalidResourceType
      layer: validation
      index: 22
      description: "Invalid resource type specified"
    - code: SourceNotAllowed
      layer: validation
      index: 23
      description: "Command source is not permitted for this operation"
    - code: UnknownAction
      layer: validation
      index: 24
      description: "Unknown action type"
    - code: GlobalStorageDisabled
      layer: validation
      index: 25
      description: "Global storage is not enabled"
    - code: TransferInProgress
      layer: validation
      index: 26
      description: "A transfer is already in progress"

    # --- 2.3 MCP-level ---
    - code: RateLimited
      layer: mcp
      index: 27
      description: "Rate limit exceeded"
    - code: InvalidCertificate
      layer: mcp
      index: 28
      description: "Certificate is invalid"
    - code: NotAuthorized
      layer: mcp
      index: 29
      description: "Not authorized for this operation"
      note: "Only for MCP-layer auth failures; validation layer uses NotOwner"

    # --- 2.4 Runtime-level ---
    - code: FuelExhausted
      layer: runtime
      index: 30
      description: "WASM fuel exhausted"
    - code: TimeoutExceeded
      layer: runtime
      index: 31
      description: "WASM execution timed out"
    - code: SnapshotOverBudget
      layer: runtime
      index: 32
      description: "Snapshot exceeds size budget"
    - code: CommandBufferFull
      layer: runtime
      index: 33
      description: "Command buffer is full"
    - code: ServerOverloaded
      layer: runtime
      index: 34
      description: "Server is overloaded; degraded mode"
    - code: InternalError
      layer: runtime
      index: 35
      description: "Engine internal error"

  naming_conventions:
    InsufficientResource: "Unified singular form; deprecated: InsufficientResources, InsufficientEnergy"
    ObjectNotFound: "Unified form; deprecated: TargetNotFound"
    CooldownActive: "Generic cooldown; SpawnOnCooldown is Spawn-specific"
    NotVisibleOrNotFound: "Safe merged code to prevent oracle inference"
    NotAuthorized: "MCP-layer only; validation layer uses NotOwner"

# =============================================================================
# 3. MCP Tools — generated tool registry with security columns
# =============================================================================
mcp_tools:
  description: "All MCP tools available to clients. Grouped by capability profile."
  total_tools: generated
  rate_limits:
    query: "50/tick"
    debug: "30/tick"
    dev_aux: "20/tick"
    deploy: "10/h"
    admin: "10/h"
    sdk_fetch: "5/min"

  tools:
    # =========================================================================
    # Onboarding (11 tools)
    # =========================================================================
    - name: swarm_get_info
      category: Onboarding
      input_schema: {}
      output_schema:
        version: string
        tick_rate: u32
        world_name: string
        player_count: u32
      rate_limit: "100/min"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: per_player

    - name: swarm_get_snapshot
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        tick: u64
        entities: "[Entity]"
        terrain: TerrainGrid
        resources: "[Resource]"
        truncated: bool
        omitted_categories: OmittedCategoryBucket
      rate_limit: "1/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_player

    - name: swarm_get_resources
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        resources: "[Resource]"
        storage: StorageInfo
        income_rate: ResourceRate_i64
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_list_rooms
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        rooms: "[{id, level, controller_level}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_player

    - name: swarm_get_room
      category: Onboarding
      input_schema:
        room_id: RoomId
      output_schema:
        terrain: TerrainGrid
        entities: "[Entity]"
        resources: "[Resource]"
        controller: ControllerInfo
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_room

    - name: swarm_list_drones
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        drones: "[{id, room, body, lifespan, status}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_get_drone
      category: Onboarding
      input_schema:
        drone_id: DroneId
      output_schema:
        id: DroneId
        room: RoomId
        body: "[BodyPart]"
        lifespan: u32
        status: DroneStatus
        code_hash: string
        fuel_used: u64
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: drone_id
      replay_class: read_replay_safe
      visibility_filter: owner_or_visible
      rate_limit_key: per_drone

    - name: swarm_get_code
      category: Onboarding
      input_schema:
        drone_id: DroneId
      output_schema:
        code: bytes
        hash: string
        language: string
        size: u32
        last_deployed: u64
      rate_limit: "20/tick"
      required_scope: "swarm:read"
      subject_source: drone_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_drone

    - name: swarm_get_docs
      category: Onboarding
      input_schema:
        topic: string?
      output_schema:
        docs: string
        sections: "[string]"
      rate_limit: "20/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global

    - name: swarm_get_schema
      category: Onboarding
      input_schema:
        entity_type: string?
      output_schema:
        schema: string
        version: string
      rate_limit: "20/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global

    - name: swarm_get_objectives
      category: Onboarding
      input_schema:
        player_id: u32?
        scope: string?         # "current" | "all" | "next"; default "current"
      output_schema:
        objectives:
          type: array
          items:
            id: string          # unique objective ID
            type: ObjectiveType
            description: string
            required:
              type: object      # {resource: amount, ...} — what you need
              additional_properties: u32
            current:
              type: object      # {resource: amount, ...} — what you have
              additional_properties: u32
            reward:
              type: object      # {resource: amount, ...} — what you get on completion
              additional_properties: u32
            priority: u32       # 0 = highest, >=1 = lower
            expires_at: u64?    # tick number, null = no deadline
      rate_limit: "5/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    # =========================================================================
    # Auth (3 tools) — 证书链模型
    # =========================================================================
    - name: swarm_register_challenge
      category: Auth
      input_schema: {}
      output_schema:
        challenge_id: string
        challenge: string
        difficulty_bits: u32
        difficulty_bits_min: u32
        difficulty_bits_max: u32
        expires_at: u64
      rate_limit: "10/min"
      required_scope: "none"
      subject_source: none
      replay_class: non_replayable
      visibility_filter: none
      rate_limit_key: per_ip
      schema_source: auth_api
      alias_of: auth_api.swarm_register_challenge
      notes: "CSR 注册 PoW challenge"

    - name: swarm_submit_csr
      category: Auth
      input_schema:
        username: string
        csr: string
        certificate_profile: string
        device_label: string
        challenge_id: string
        nonce: string
        csr_signature: string
        email: string?
        recovery_password: string?
      output_schema:
        certificate_bundle: CertificateBundle
      rate_limit: "1/30s"
      required_scope: "none"
      subject_source: none
      replay_class: non_idempotent_mutation
      visibility_filter: none
      rate_limit_key: per_ip
      schema_source: auth_api
      alias_of: auth_api.swarm_submit_csr
      notes: "CSR 提交 + 证书签发"

    - name: swarm_cert_check
      category: Auth
      input_schema:
        certificate_id: string
      output_schema:
        valid: bool
        player_id: PlayerId
        usage: string
        scope: string
        audience: string
        expires_at: u64
        revoked: bool
      rate_limit: "100/min"
      required_scope: "swarm:auth"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player
      schema_source: auth_api
      alias_of: auth_api.swarm_cert_check
      notes: "证书验证"

    # =========================================================================
    # Play (14 tools)
    # =========================================================================
    - name: swarm_get_world_stats
      category: Play
      input_schema:
        scope: string
        limit: u32
      output_schema:
        stats: "[{player, gcl, rooms, drones}]"
      rate_limit: "5/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global
      notes: "World non-competitive stats — no ranking, no rewards, no fairness guarantees"

    - name: swarm_get_replay
      category: Play
      input_schema:
        tick_range: TickRange
        player_id: PlayerId
      output_schema:
        ticks: "[TickData]"
        entities: "[Entity]"
        commands: "[Command]"
        events: "[Event]"
      rate_limit: "5/min"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: global

    - name: swarm_get_events
      category: Play
      input_schema:
        room_id: RoomId
        tick_range: TickRange
      output_schema:
        events: "[{tick, type, data}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_room

    - name: swarm_get_terrain
      category: Play
      input_schema:
        room_id: RoomId
        bounds: Bounds
      output_schema:
        terrain_grid: TerrainGrid
        size: Size
      rate_limit: null  # host fn only
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: host_only

    - name: swarm_get_path
      category: Play
      input_schema:
        from: Position
        to: Position
        player_id: PlayerId
      output_schema:
        path: "[Position]"
        distance: i64  # milli_distance units (1e-3 cells)
        cost: u64  # micro_cost units (1e-6 resource units)
      rate_limit: null  # host fn only
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
