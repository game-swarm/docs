api_version: "0.3.0"

# =============================================================================
# 1. CommandAction — all 19 variants
# =============================================================================
command_action:
  description: "Core CommandAction enum. WASM tick() output CommandIntent action types."
  total_variants: 19
  variants:
    # --- 1.1 Core (11) ---
    - name: Move
      index: 1
      category: core
      parameters:
        - name: direction
          type: Direction4
          required: true
      description: "Move one cell in N/S/E/W direction"

    - name: Harvest
      index: 2
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Harvest a resource from target"

    - name: Transfer
      index: 3
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
        - name: resource
          type: ResourceType
          required: true
        - name: amount
          type: u32
          required: true
      description: "Transfer resources locally to target"

    - name: Withdraw
      index: 4
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
        - name: resource
          type: ResourceType
          required: true
        - name: amount
          type: u32
          required: true
      description: "Withdraw resources from structure"

    - name: Build
      index: 5
      category: core
      parameters:
        - name: structure_type
          type: StructureType
          required: true
        - name: x
          type: i32
          required: true
        - name: y
          type: i32
          required: true
      description: "Build a structure at (x,y)"

    - name: Attack
      index: 6
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Melee attack target"

    - name: RangedAttack
      index: 7
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Ranged attack target"

    - name: Heal
      index: 8
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Repair or heal target"

    - name: Spawn
      index: 9
      category: core
      parameters:
        - name: body_parts
          type: "[BodyPart]"
          required: true
        - name: spawn_id
          type: SpawnId
          required: true
      description: "Spawn a drone with given body parts"

    - name: Recycle
      index: 10
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Recycle a drone or structure"

    - name: ClaimController
      index: 11
      category: core
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Claim a room controller"

    # --- 1.2 Global Storage (2) ---
    - name: TransferToGlobal
      index: 12
      category: global_storage
      parameters:
        - name: resource
          type: ResourceType
          required: true
        - name: amount
          type: u32
          required: true
      description: "Deposit resources to global storage"

    - name: TransferFromGlobal
      index: 13
      category: global_storage
      parameters:
        - name: resource
          type: ResourceType
          required: true
        - name: amount
          type: u32
          required: true
      description: "Withdraw resources from global storage"

    # --- 1.3 Special Attack (6) ---
    - name: Hack
      index: 14
      category: special_attack
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "5-stage intrusion attack"

    - name: Drain
      index: 15
      category: special_attack
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Continuously drain resources from target"

    - name: Overload
      index: 16
      category: special_attack
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Reduce target fuel budget"

    - name: Debilitate
      index: 17
      category: special_attack
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Reduce target efficiency"

    - name: Disrupt
      index: 18
      category: special_attack
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Interrupt target operation"

    - name: Fortify
      index: 19
      category: special_attack
      parameters:
        - name: target_id
          type: EntityId
          required: true
      description: "Strengthen own defenses"

  custom_actions:
    description: "Custom actions defined in World Action Manifest, not in Core enum."
    known:
      - name: Leech
        action_id: custom
        description: "World Action Manifest custom_action"
      - name: Fabricate
        action_id: custom
        description: "World Action Manifest custom_action"

# =============================================================================
# 2. RejectionReason — 35 canonical codes + debug_detail (D2/B)
# =============================================================================
rejection_reason:
  description: >
    All command rejection reasons. Covers Pipeline, Validation, MCP, and Runtime layers.
    Per D2/B: The 35 canonical codes are the wire enum. Detailed contextual information
    (e.g. NotMovable, Fatigued, specific target state) goes into the `debug_detail` field,
    NOT into additional RejectionReason enum variants. This keeps the wire enum stable
    while providing rich debugging data.
  total_canonical_codes: 35
  debug_detail:
    description: >
      Non-canonical, human-readable detail string providing context beyond the
      35 canonical codes. Examples: "NotMovable: encumbered by 3 units", "Fatigued:
      action cooldown 12 ticks remaining", "PathBlocked: obstacle at (5,3)".
      This field is NOT part of the RejectionReason wire enum — it is a separate
      string payload that does not affect replay determinism.
    max_length: 512
    unit: "bytes"
  detail_level:
    description: >
      Controls the verbosity of debug_detail in rejection responses. Allows
      operators to tune information leakage vs debugging utility.
    enum:
      - value: competitive
        description: "Minimal detail — only canonical code, no debug_detail. Tournament/ladder mode."
      - value: practice
        description: "Moderate detail — debug_detail includes cooldown/timer values, bot-facing hints."
      - value: training
        description: "Full detail — debug_detail includes exact state diffs, path traces, internal diagnostics."
    default: competitive

  variants:
    # --- 2.1 Pipeline-level (pre-processing, not in enum proper) ---
    - code: InvalidJson
      layer: pipeline
      description: "JSON parsing failed"
    - code: SchemaViolation
      layer: pipeline
      description: "Command schema does not conform to IDL"

    # --- 2.2 Validation-level ---
    - code: ObjectNotFound
      layer: validation
      index: 1
      description: "Target entity does not exist"
    - code: NotOwner
      layer: validation
      index: 2
      description: "Not the owner of the target entity"
    - code: InsufficientResource
      layer: validation
      index: 3
      description: "Insufficient resources for operation"
      note: "Unified singular form; deprecated: InsufficientResources, InsufficientEnergy"
    - code: OutOfRange
      layer: validation
      index: 4
      description: "Target is beyond operation range"
    - code: NotStructure
      layer: validation
      index: 5
      description: "Target is not a structure"
    - code: NotController
      layer: validation
      index: 6
      description: "Target is not a controller"
    - code: NotVisibleOrNotFound
      layer: validation
      index: 7
      description: "Target not visible or does not exist (merged to prevent oracle inference)"
    - code: TargetNotVisible
      layer: validation
      index: 8
      description: "Target is not in field of view"
    - code: SpawnOnCooldown
      layer: validation
      index: 9
      description: "Spawn is on cooldown"
    - code: RoomDroneCapReached
      layer: validation
      index: 10
      description: "Room drone capacity reached"
    - code: AuthContextInvalid
      layer: validation
      index: 11
      description: "Authentication context is invalid"
    - code: CooldownActive
      layer: validation
      index: 12
      description: "Operation cooldown is active"
      note: "Generic cooldown; SpawnOnCooldown reserved for Spawn-specific"
    - code: InvalidDirection
      layer: validation
      index: 13
      description: "Direction is not one of the 4 valid directions"
    - code: PositionOccupied
      layer: validation
      index: 14
      description: "Target position is occupied"
    - code: ConstructionLimitReached
      layer: validation
      index: 15
      description: "Structure construction limit reached"
    - code: SafeModeActive
      layer: validation
      index: 16
      description: "Target is in safe mode"
    - code: TargetOverloadCooldown
      layer: validation
      index: 17
      description: "Target has an active overload cooldown"
    - code: TargetFortifyCooldown
      layer: validation
      index: 18
      description: "Target has an active fortify cooldown"
    - code: NotEnoughBodyParts
      layer: validation
      index: 19
      description: "Not enough body parts for operation"
    - code: InvalidBodyPart
      layer: validation
      index: 20
      description: "Invalid body part specified"
    - code: InvalidStructureType
      layer: validation
      index: 21
      description: "Invalid structure type specified"
    - code: InvalidResourceType
      layer: validation
      index: 22
      description: "Invalid resource type specified"
    - code: SourceNotAllowed
      layer: validation
      index: 23
      description: "Command source is not permitted for this operation"
    - code: UnknownAction
      layer: validation
      index: 24
      description: "Unknown action type"
    - code: GlobalStorageDisabled
      layer: validation
      index: 25
      description: "Global storage is not enabled"
    - code: TransferInProgress
      layer: validation
      index: 26
      description: "A transfer is already in progress"

    # --- 2.3 MCP-level ---
    - code: RateLimited
      layer: mcp
      index: 27
      description: "Rate limit exceeded"
    - code: InvalidCertificate
      layer: mcp
      index: 28
      description: "Certificate is invalid"
    - code: NotAuthorized
      layer: mcp
      index: 29
      description: "Not authorized for this operation"
      note: "Only for MCP-layer auth failures; validation layer uses NotOwner"

    # --- 2.4 Runtime-level ---
    - code: FuelExhausted
      layer: runtime
      index: 30
      description: "WASM fuel exhausted"
    - code: TimeoutExceeded
      layer: runtime
      index: 31
      description: "WASM execution timed out"
    - code: SnapshotOverBudget
      layer: runtime
      index: 32
      description: "Snapshot exceeds size budget"
    - code: CommandBufferFull
      layer: runtime
      index: 33
      description: "Command buffer is full"
    - code: ServerOverloaded
      layer: runtime
      index: 34
      description: "Server is overloaded; degraded mode"
    - code: InternalError
      layer: runtime
      index: 35
      description: "Engine internal error"

  naming_conventions:
    InsufficientResource: "Unified singular form; deprecated: InsufficientResources, InsufficientEnergy"
    ObjectNotFound: "Unified form; deprecated: TargetNotFound"
    CooldownActive: "Generic cooldown; SpawnOnCooldown is Spawn-specific"
    NotVisibleOrNotFound: "Safe merged code to prevent oracle inference"
    NotAuthorized: "MCP-layer only; validation layer uses NotOwner"

# =============================================================================
# 3. MCP Tools — 46 tools with security columns
# =============================================================================
mcp_tools:
  description: "All MCP tools available to clients. Grouped by capability profile."
  total_tools: 46
  rate_limits:
    query: "50/tick"
    debug: "30/tick"
    dev_aux: "20/tick"
    deploy: "10/h"
    admin: "10/h"
    sdk_fetch: "5/min"

  tools:
    # =========================================================================
    # Onboarding (8 tools)
    # =========================================================================
    - name: swarm_get_info
      category: Onboarding
      input_schema: {}
      output_schema:
        version: string
        tick_rate: u32
        world_name: string
        player_count: u32
      rate_limit: "100/min"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: per_player

    - name: swarm_get_snapshot
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        tick: u64
        entities: "[Entity]"
        terrain: TerrainGrid
        resources: "[Resource]"
        truncated: bool
        omitted_count: u32
      rate_limit: "1/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_player

    - name: swarm_get_resources
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        resources: "[Resource]"
        storage: StorageInfo
        income_rate: f64
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_list_rooms
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
        rooms: "[{id, level, controller_level}]"
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_player

    - name: swarm_get_room
      category: Onboarding
      input_schema:
        room_id: RoomId
      output_schema:
        terrain: TerrainGrid
        entities: "[Entity]"
        resources: "[Resource]"
        controller: ControllerInfo
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: fog_of_war
      rate_limit_key: per_room

    - name: swarm_list_drones
      category: Onboarding
      input_schema:
        player_id: PlayerId
      output_schema:
