    # =========================================================================
    # Deploy (6 tools)
    # =========================================================================
    - name: swarm_deploy
      category: Deploy
      input_schema:
        player_id: PlayerId
        drone_id: DroneId
        wasm_bytes: bytes
        metadata: Metadata
      output_schema:
        deploy_id: DeployId
        accepted: bool
        validation_errors: "[string]"
        fdb_version_counter: u64
        object_store_key: string
      rate_limit: "10/h"
      required_scope: "swarm:deploy"
      subject_source: player_id
      replay_class: idempotent_mutation
      visibility_filter: owner
      rate_limit_key: per_player
      notes: >
        Uses deploy_mutation pattern (R16 B6): WASM blob is asynchronously uploaded
        to the object store (see persistence.async_object_store_upload). The FDB commit
        only writes a small manifest + hash pointer + fdb_version_counter.
        The fdb_version_counter provides a strict total order for replay determinism.

    - name: swarm_validate_module
      category: Deploy
      input_schema:
        wasm_bytes: bytes
      output_schema:
        valid: bool
        errors: "[string]"
        fuel_estimate: u64
      rate_limit: "10/h"
      required_scope: "swarm:deploy"
      subject_source: player_id
