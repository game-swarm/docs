        fdb_version_counter: u64
        object_store_key: string
      rate_limit: "20/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_list_deployments
