      rate_limit: "20/tick"
      required_scope: "swarm:read"
      subject_source: player_id
      replay_class: read_replay_safe
      visibility_filter: owner
      rate_limit_key: per_player

    - name: swarm_get_world_config
      category: Deploy
      input_schema: {}
      output_schema:
        rules: "[RuleModule]"
        mods: "[ModInfo]"
        limits: Limits
        tick_rate: u32
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global

    - name: swarm_get_world_rules
      category: Deploy
      input_schema: {}
      output_schema:
        rule_modules: "[RuleModule]"
        parameters: Parameters
        version: string
      rate_limit: "10/tick"
      required_scope: "swarm:read"
      subject_source: world
      replay_class: read_replay_safe
      visibility_filter: none
      rate_limit_key: global

    # =========================================================================
    # Debug (7 tools)
    # =========================================================================
    - name: swarm_get_tick_trace
      category: Debug
      input_schema:
        tick: u64
      output_schema:
        commands: "[Command]"
        state_diff: StateDiff
        rejections: "[Rejection]"
        metrics: Metrics
      rate_limit: "30/tick"
